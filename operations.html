<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
<title>Delivery Money · All Operations</title>

<style>
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
    padding: 20px;
    margin: 0;
    min-height: 100vh;
}

.container {
    max-width: 1600px;
    margin: 0 auto;
}

/* Header */
.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 30px;
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
    padding: 20px 30px;
    border-radius: 60px;
    border: 1px solid rgba(255,255,255,0.2);
}

.header h1 {
    color: white;
    font-size: 2rem;
    font-weight: 700;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
    display: flex;
    align-items: center;
    gap: 15px;
}

.header h1 svg {
    width: 40px;
    height: 40px;
    fill: white;
}

.back-btn {
    background: rgba(255,255,255,0.2);
    color: white;
    border: 1px solid rgba(255,255,255,0.3);
    padding: 12px 24px;
    border-radius: 40px;
    cursor: pointer;
    font-weight: 600;
    font-size: 1rem;
    display: inline-flex;
    align-items: center;
    gap: 10px;
    transition: all 0.3s ease;
    text-decoration: none;
}

.back-btn:hover {
    background: rgba(255,255,255,0.3);
    transform: translateY(-2px);
}

.back-btn svg {
    width: 20px;
    height: 20px;
    fill: currentColor;
}

/* Stats Cards */
.stats-container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 20px;
    margin-bottom: 30px;
}

.stat-card {
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 30px;
    padding: 20px;
    color: white;
    transition: transform 0.3s;
}

.stat-card:hover {
    transform: translateY(-5px);
    background: rgba(255,255,255,0.15);
}

.stat-label {
    font-size: 0.9rem;
    opacity: 0.8;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
}

.stat-value {
    font-size: 2rem;
    font-weight: 700;
}

.stat-unit {
    font-size: 1rem;
    opacity: 0.7;
    margin-left: 5px;
}

.stat-detail {
    font-size: 0.85rem;
    opacity: 0.7;
    margin-top: 8px;
    display: flex;
    justify-content: space-between;
}

/* Filters */
.filters-section {
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 30px;
    padding: 20px;
    margin-bottom: 30px;
    display: flex;
    flex-wrap: wrap;
    gap: 15px;
    align-items: center;
}

.filter-label {
    color: white;
    font-weight: 500;
    margin-right: 10px;
}

.filter-select {
    background: rgba(255,255,255,0.2);
    border: 1px solid rgba(255,255,255,0.3);
    border-radius: 30px;
    padding: 10px 20px;
    color: white;
    font-size: 0.95rem;
    cursor: pointer;
    outline: none;
    min-width: 150px;
}

.filter-select option {
    background: #2a5298;
    color: white;
}

.search-box {
    background: rgba(255,255,255,0.2);
    border: 1px solid rgba(255,255,255,0.3);
    border-radius: 30px;
    padding: 10px 20px;
    color: white;
    font-size: 0.95rem;
    flex: 1;
    min-width: 250px;
}

.search-box::placeholder {
    color: rgba(255,255,255,0.7);
}

.clear-filters {
    background: rgba(255,255,255,0.2);
    border: 1px solid rgba(255,255,255,0.3);
    border-radius: 30px;
    padding: 10px 20px;
    color: white;
    cursor: pointer;
    transition: all 0.3s;
}

.clear-filters:hover {
    background: rgba(255,255,255,0.3);
}

/* Operations Table */
.table-container {
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 30px;
    overflow-x: auto;
    margin-bottom: 30px;
}

.operations-table {
    width: 100%;
    border-collapse: collapse;
    color: white;
    min-width: 1200px;
}

.operations-table th {
    background: rgba(0,0,0,0.3);
    padding: 20px 15px;
    font-weight: 600;
    font-size: 0.9rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    text-align: center;
    border-bottom: 2px solid rgba(255,255,255,0.1);
    position: sticky;
    top: 0;
    z-index: 10;
}

.operations-table td {
    padding: 15px;
    border-bottom: 1px solid rgba(255,255,255,0.1);
    text-align: center;
    vertical-align: middle;
}

.operations-table tr:hover {
    background: rgba(255,255,255,0.15);
}

/* Person Badges */
.ops-person-badge {
    display: inline-block;
    padding: 8px 16px;
    border-radius: 30px;
    font-weight: 600;
    font-size: 13px;
    min-width: 100px;
    text-transform: capitalize;
}

.person-manager {
    background: rgba(255, 215, 0, 0.2);
    border: 1px solid gold;
    color: #fff5cc;
}

.person-worker {
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.3);
    color: white;
}

/* Arrow between persons */
.transfer-arrow {
    color: rgba(255,255,255,0.5);
    margin: 0 8px;
    font-size: 1.2rem;
}

/* Type Badge */
.type-badge {
    display: inline-block;
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
}

.type-payment {
    background: rgba(33, 150, 243, 0.3);
    color: #bbdefb;
    border: 1px solid #2196f3;
}

.type-at-work {
    background: rgba(255, 152, 0, 0.3);
    color: #ffe0b2;
    border: 1px solid #ff9800;
}

.type-paid {
    background: rgba(76, 175, 80, 0.3);
    color: #c8e6c9;
    border: 1px solid #4caf50;
}

/* Amount */
.amount-positive {
    color: #a5d6a7;
    font-weight: 700;
    font-size: 1.1rem;
}

/* Description cell */
.description-cell {
    max-width: 250px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    color: rgba(255,255,255,0.9);
    cursor: help;
}

.description-cell:hover {
    overflow: visible;
    white-space: normal;
    word-wrap: break-word;
    background: rgba(0,0,0,0.9);
    border-radius: 8px;
    padding: 8px;
    position: absolute;
    z-index: 1000;
    max-width: 300px;
    transform: translateY(-100%);
    margin-top: -10px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.3);
}

/* No Data */
.no-data-ops {
    text-align: center;
    padding: 80px;
    color: white;
}

.no-data-icon {
    font-size: 5rem;
    margin-bottom: 20px;
    opacity: 0.7;
}

/* Pagination */
.pagination {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-top: 30px;
    flex-wrap: wrap;
}

.page-btn {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    color: white;
    width: 45px;
    height: 45px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.3s;
    font-weight: 500;
}

.page-btn:hover {
    background: rgba(255,255,255,0.3);
    transform: scale(1.1);
}

.page-btn.active {
    background: white;
    color: #2a5298;
    font-weight: 700;
}

.page-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
}

/* Delete button */
.ops-delete-btn {
    background: rgba(255,82,82,0.2);
    border: 1px solid #ff5252;
    color: white;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    transition: all 0.3s;
    font-size: 1.2rem;
}

.ops-delete-btn:hover {
    background: #ff5252;
    transform: scale(1.1) rotate(5deg);
}

/* Loading */
.loading {
    text-align: center;
    padding: 80px;
    color: white;
}

.loading-spinner {
    width: 60px;
    height: 60px;
    border: 4px solid rgba(255,255,255,0.2);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 1s linear infinite;
    margin: 0 auto 25px;
}

@keyframes spin {
    to { transform: rotate(360deg); }
}

/* Export button */
.export-btn {
    background: rgba(76, 175, 80, 0.3);
    border: 1px solid #4caf50;
    color: white;
    padding: 12px 24px;
    border-radius: 40px;
    cursor: pointer;
    font-weight: 600;
    display: inline-flex;
    align-items: center;
    gap: 10px;
    transition: all 0.3s;
    margin-left: auto;
}

.export-btn:hover {
    background: #4caf50;
    transform: translateY(-2px);
}

.export-btn svg {
    width: 20px;
    height: 20px;
    fill: currentColor;
}

/* Items per page selector */
.items-per-page {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 30px;
    padding: 8px 15px;
    color: white;
    margin-left: 15px;
    cursor: pointer;
}

/* Logout button */
.logout-btn {
    background: rgba(255,82,82,0.2);
    border: 1px solid #ff5252;
    color: white;
    padding: 12px 24px;
    border-radius: 40px;
    cursor: pointer;
    font-weight: 600;
    display: inline-flex;
    align-items: center;
    gap: 10px;
    transition: all 0.3s;
}

.logout-btn:hover {
    background: #ff5252;
    transform: translateY(-2px);
}

/* Responsive */
@media (max-width: 768px) {
    .header {
        flex-direction: column;
        gap: 15px;
        text-align: center;
    }
    
    .filters-section {
        flex-direction: column;
    }
    
    .filter-select, .search-box {
        width: 100%;
    }
    
    .stats-container {
        grid-template-columns: 1fr;
    }
    
    .operations-table {
        min-width: 1000px;
    }
}
</style>
</head>

<div class="container">

<script>
// ========== التحقق من المصادقة ==========
(function() {
    console.log('Checking authentication...');
    
    function checkAuth() {
        // التحقق من وجود جلسة صالحة
        const isAuth = sessionStorage.getItem('delivery_auth') === 'true';
        const authTime = sessionStorage.getItem('delivery_auth_time');
        const now = Date.now();
        const eightHours = 8 * 60 * 60 * 1000;
        
        // التحقق من localStorage كنسخة احتياطية
        const localAuth = localStorage.getItem('delivery_auth') === 'true';
        const localTime = localStorage.getItem('delivery_auth_time');
        
        if (isAuth && authTime && (now - parseInt(authTime)) < eightHours) {
            console.log('Session authentication valid');
            return true;
        } else if (localAuth && localTime && (now - parseInt(localTime)) < eightHours) {
            // استعادة الجلسة من localStorage
            console.log('Restoring session from localStorage');
            sessionStorage.setItem('delivery_auth', 'true');
            sessionStorage.setItem('delivery_auth_time', localTime);
            return true;
        } else {
            console.log('No valid session, redirecting to login');
            
            // حفظ الصفحة المطلوبة لإعادة التوجيه بعد login
            sessionStorage.setItem('redirect_after_login', 'operations.html');
            
            // إعادة التوجيه إلى صفحة login
            window.location.replace('login.html');
            return false;
        }
    }
    
    // تنفيذ التحقق
    if (!checkAuth()) {
        throw new Error('Authentication required');
    }
})();

// ========== دوال التنقل ==========
function goToAdmin() {
    // التحقق من الجلسة قبل الانتقال
    if (sessionStorage.getItem('delivery_auth') === 'true' || localStorage.getItem('delivery_auth') === 'true') {
        window.location.href = 'admin.html';
    } else {
        sessionStorage.setItem('redirect_after_login', 'admin.html');
        window.location.href = 'login.html';
    }
}

function logout() {
    // تنظيف جميع بيانات الجلسة
    sessionStorage.removeItem('delivery_auth');
    sessionStorage.removeItem('delivery_auth_time');
    localStorage.removeItem('delivery_auth');
    localStorage.removeItem('delivery_auth_time');
    
    // إعادة التوجيه إلى login
    window.location.href = 'login.html';
}

// ========== تهيئة Firebase ==========
const firebaseConfig = {
    apiKey: "AIzaSyCh8ssk6K7_LXDPpG3X85Z7VlUwDa_0_Og",
    authDomain: "deliverymarrakech.firebaseapp.com",
    projectId: "deliverymarrakech",
    storageBucket: "deliverymarrakech.firebasestorage.app",
    messagingSenderId: "543072772322",
    appId: "1:543072772322:web:468d0c047e06c86bde7ebb",
    measurementId: "G-YMXBJFJ9N8"
};

// تهيئة Firebase
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// ========== المتغيرات العامة ==========
let allOperations = [];
let filteredOps = [];
let currentPage = 1;
let itemsPerPage = 15;

// الثوابت
const managers = ['anas', 'oussama', 'amine'];
const workers = ['houssam', 'zaki', 'mohamed'];

// كاش لبيانات الدفعات
const paymentCache = new Map();

// ========== عناصر DOM ==========
const tableBody = document.getElementById('tableBody');
const typeFilter = document.getElementById('typeFilter');
const personFilter = document.getElementById('personFilter');
const searchInput = document.getElementById('searchInput');
const itemsPerPageSelect = document.getElementById('itemsPerPage');
const clearFiltersBtn = document.getElementById('clearFilters');
const paginationDiv = document.getElementById('pagination');

// عناصر الإحصائيات
const totalOpsSpan = document.getElementById('totalOps');
const totalAmountSpan = document.getElementById('totalAmount');
const totalPaymentsSpan = document.getElementById('totalPayments');
const totalTransfersSpan = document.getElementById('totalTransfers');
const managersTotalSpan = document.getElementById('managersTotal');
const workersTotalSpan = document.getElementById('workersTotal');
const managersCountSpan = document.getElementById('managersCount');
const workersCountSpan = document.getElementById('workersCount');
const anasTotalSpan = document.getElementById('anasTotal');
const oussamaTotalSpan = document.getElementById('oussamaTotal');
const amineTotalSpan = document.getElementById('amineTotal');
const houssamTotalSpan = document.getElementById('houssamTotal');
const zakiTotalSpan = document.getElementById('zakiTotal');
const mohamedTotalSpan = document.getElementById('mohamedTotal');

// ========== الدوال المساعدة ==========
function formatDate(timestamp) {
    if (!timestamp) return '-';
    try {
        const date = timestamp.toDate ? timestamp.toDate() : new Date(timestamp);
        return date.toLocaleString('en-US', {
            month: '2-digit',
            day: '2-digit',
            hour: '2-digit',
            minute: '2-digit'
        });
    } catch {
        return '-';
    }
}

function getPersonClass(person) {
    if (!person) return 'person-worker';
    return managers.includes(person.toLowerCase()) ? 'person-manager' : 'person-worker';
}

function getTypeInfo(status) {
    if (status === 'paid') {
        return { class: 'type-paid', text: 'Paid' };
    } else if (status === 'atwork') {
        return { class: 'type-at-work', text: 'At Work' };
    } else {
        return { class: 'type-payment', text: 'Payment' };
    }
}

// ========== تحميل البيانات ==========
async function loadData() {
    try {
        // تحميل الدفعات
        const paymentsSnap = await db.collection("payments")
            .orderBy("time", "desc")
            .get();
        
        // بناء الكاش
        paymentsSnap.forEach(doc => {
            const data = doc.data();
            paymentCache.set(doc.id, {
                sender: data.name1,
                receiver: data.name2,
                description: data.description || '-',
                amount: parseFloat(data.price) || 0,
                timestamp: data.time,
                date: formatDate(data.time)
            });
        });
        
        // تحميل التحويلات
        const walletSnap = await db.collection("wallet_entries")
            .orderBy("timestamp", "desc")
            .get();
        
        // دمج العمليات
        allOperations = [];
        
        // إضافة الدفعات
        paymentsSnap.forEach(doc => {
            const data = doc.data();
            allOperations.push({
                id: doc.id,
                type: 'payment',
                collection: 'payments',
                sender: data.name1,
                receiver: data.name2,
                amount: parseFloat(data.price) || 0,
                description: data.description || '-',
                timestamp: data.time,
                date: formatDate(data.time),
                status: 'atwork'
            });
        });
        
        // إضافة التحويلات
        walletSnap.forEach(doc => {
            const data = doc.data();
            
            // البحث عن البيانات الأصلية
            let originalData = null;
            if (data.originalPaymentId && paymentCache.has(data.originalPaymentId)) {
                originalData = paymentCache.get(data.originalPaymentId);
            }
            
            // استخدام البيانات الأصلية
            const sender = originalData ? originalData.sender : (data.name1 || 'System');
            const receiver = originalData ? originalData.receiver : (data.name2 || data.member || 'Unknown');
            const description = originalData ? originalData.description : (data.description || 'Transfer');
            
            allOperations.push({
                id: doc.id,
                type: 'transfer',
                collection: 'wallet_entries',
                sender: sender,
                receiver: receiver,
                amount: data.amount || 0,
                description: description,
                timestamp: data.timestamp,
                date: formatDate(data.timestamp),
                status: data.status || 'paid',
                originalPaymentId: data.originalPaymentId
            });
        });
        
        // ترتيب العمليات
        allOperations.sort((a, b) => {
            const ta = a.timestamp?.seconds || 0;
            const tb = b.timestamp?.seconds || 0;
            return tb - ta;
        });
        
        // تطبيق الفلاتر
        applyFilters();
        
    } catch (error) {
        console.error("Error loading data:", error);
        showError(error.message);
    }
}

// ========== مستمع للتحديثات المباشرة ==========
function setupListener() {
    db.collection("wallet_entries").onSnapshot((snapshot) => {
        snapshot.docChanges().forEach((change) => {
            const docId = change.doc.id;
            const newData = change.doc.data();
            
            const index = allOperations.findIndex(op => op.id === docId && op.collection === 'wallet_entries');
            
            if (index !== -1) {
                if (change.type === 'modified') {
                    let originalData = null;
                    if (allOperations[index].originalPaymentId && paymentCache.has(allOperations[index].originalPaymentId)) {
                        originalData = paymentCache.get(allOperations[index].originalPaymentId);
                    }
                    
                    allOperations[index] = {
                        ...allOperations[index],
                        status: newData.status || allOperations[index].status,
                        sender: originalData ? originalData.sender : allOperations[index].sender,
                        receiver: originalData ? originalData.receiver : allOperations[index].receiver,
                        description: originalData ? originalData.description : allOperations[index].description,
                        amount: allOperations[index].amount
                    };
                }
            } else if (change.type === 'added') {
                let originalData = null;
                if (newData.originalPaymentId && paymentCache.has(newData.originalPaymentId)) {
                    originalData = paymentCache.get(newData.originalPaymentId);
                }
                
                const sender = originalData ? originalData.sender : (newData.name1 || 'System');
                const receiver = originalData ? originalData.receiver : (newData.name2 || newData.member || 'Unknown');
                const description = originalData ? originalData.description : (newData.description || 'Transfer');
                
                allOperations.push({
                    id: docId,
                    type: 'transfer',
                    collection: 'wallet_entries',
                    sender: sender,
                    receiver: receiver,
                    amount: newData.amount || 0,
                    description: description,
                    timestamp: newData.timestamp,
                    date: formatDate(newData.timestamp),
                    status: newData.status || 'paid',
                    originalPaymentId: newData.originalPaymentId
                });
                
                allOperations.sort((a, b) => {
                    const ta = a.timestamp?.seconds || 0;
                    const tb = b.timestamp?.seconds || 0;
                    return tb - ta;
                });
            }
            
            applyFilters();
        });
    }, (error) => {
        console.error("Listener error:", error);
    });
}

// ========== تطبيق الفلاتر ==========
function applyFilters() {
    const type = typeFilter.value;
    const person = personFilter.value.toLowerCase();
    const search = searchInput.value.toLowerCase();
    
    filteredOps = allOperations.filter(op => {
        if (type !== 'all') {
            if (type === 'atwork' && op.status !== 'atwork') return false;
            if (type === 'paid' && op.status !== 'paid') return false;
            if (type === 'payment' && op.type !== 'payment') return false;
            if (type === 'transfer' && op.type !== 'transfer') return false;
        }
        
        if (person !== 'all') {
            const sender = op.sender?.toLowerCase() || '';
            const receiver = op.receiver?.toLowerCase() || '';
            if (sender !== person && receiver !== person) return false;
        }
        
        if (search) {
            const desc = op.description?.toLowerCase() || '';
            const sender = op.sender?.toLowerCase() || '';
            const receiver = op.receiver?.toLowerCase() || '';
            if (!desc.includes(search) && !sender.includes(search) && !receiver.includes(search)) {
                return false;
            }
        }
        
        return true;
    });
    
    updateStats();
    currentPage = 1;
    renderTable();
}

// ========== تحديث الإحصائيات ==========
function updateStats() {
    const totals = {
        anas: 0, oussama: 0, amine: 0,
        houssam: 0, zaki: 0, mohamed: 0
    };
    
    filteredOps.forEach(op => {
        if (op.type === 'payment') {
            const sender = op.sender?.toLowerCase();
            if (totals.hasOwnProperty(sender)) {
                totals[sender] += op.amount;
            }
        }
    });
    
    const managersTotal = totals.anas + totals.oussama + totals.amine;
    const workersTotal = totals.houssam + totals.zaki + totals.mohamed;
    
    totalOpsSpan.textContent = filteredOps.length;
    totalAmountSpan.textContent = filteredOps.reduce((s, o) => s + o.amount, 0).toFixed(2);
    totalPaymentsSpan.textContent = filteredOps.filter(o => o.type === 'payment').length;
    totalTransfersSpan.textContent = filteredOps.filter(o => o.type === 'transfer').length;
    
    managersTotalSpan.textContent = managersTotal.toFixed(2);
    workersTotalSpan.textContent = workersTotal.toFixed(2);
    
    managersCountSpan.textContent = filteredOps.filter(o => 
        o.type === 'payment' && managers.includes(o.sender?.toLowerCase())
    ).length;
    
    workersCountSpan.textContent = filteredOps.filter(o => 
        o.type === 'payment' && workers.includes(o.sender?.toLowerCase())
    ).length;
    
    anasTotalSpan.textContent = totals.anas.toFixed(2);
    oussamaTotalSpan.textContent = totals.oussama.toFixed(2);
    amineTotalSpan.textContent = totals.amine.toFixed(2);
    houssamTotalSpan.textContent = totals.houssam.toFixed(2);
    zakiTotalSpan.textContent = totals.zaki.toFixed(2);
    mohamedTotalSpan.textContent = totals.mohamed.toFixed(2);
}

// ========== عرض الجدول ==========
function renderTable() {
    const start = (currentPage - 1) * itemsPerPage;
    const end = start + itemsPerPage;
    const pageItems = filteredOps.slice(start, end);
    
    if (filteredOps.length === 0) {
        tableBody.innerHTML = `
            <tr>
                <td colspan="8">
                    <div class="no-data-ops">
                        <div class="no-data-icon">📭</div>
                        No operations
                    </div>
                </td>
            </tr>
        `;
        paginationDiv.innerHTML = '';
        return;
    }
    
    let html = '';
    pageItems.forEach(op => {
        const typeInfo = getTypeInfo(op.status);
        const senderClass = getPersonClass(op.sender);
        const receiverClass = getPersonClass(op.receiver);
        
        html += `
            <tr>
                <td><span class="type-badge ${typeInfo.class}">${typeInfo.text}</span></td>
                <td><span class="ops-person-badge ${senderClass}">${op.sender || '-'}</span></td>
                <td><span class="transfer-arrow">→</span></td>
                <td><span class="ops-person-badge ${receiverClass}">${op.receiver || '-'}</span></td>
                <td class="amount-positive">${op.amount.toFixed(2)}</td>
                <td class="description-cell" title="${op.description}">${op.description}</td>
                <td>${op.date}</td>
                <td>
                    <button class="ops-delete-btn" onclick="deleteOp('${op.id}', '${op.collection}')">🗑️</button>
                </td>
            </tr>
        `;
    });
    
    tableBody.innerHTML = html;
    renderPagination();
}

// ========== عرض أرقام الصفحات ==========
function renderPagination() {
    const totalPages = Math.ceil(filteredOps.length / itemsPerPage);
    if (totalPages <= 1) {
        paginationDiv.innerHTML = '';
        return;
    }
    
    let pages = '';
    pages += `<button class="page-btn" onclick="changePage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>‹</button>`;
    
    for (let i = 1; i <= totalPages; i++) {
        if (i === 1 || i === totalPages || (i >= currentPage - 2 && i <= currentPage + 2)) {
            pages += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="changePage(${i})">${i}</button>`;
        } else if (i === currentPage - 3 || i === currentPage + 3) {
            pages += `<span class="page-btn" style="background:transparent;">...</span>`;
        }
    }
    
    pages += `<button class="page-btn" onclick="changePage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}>›</button>`;
    paginationDiv.innerHTML = pages;
}

// ========== تغيير الصفحة ==========
function changePage(page) {
    const totalPages = Math.ceil(filteredOps.length / itemsPerPage);
    if (page < 1 || page > totalPages) return;
    currentPage = page;
    renderTable();
    document.querySelector('.table-container').scrollIntoView({ behavior: 'smooth' });
}

// ========== حذف عملية ==========
async function deleteOp(id, collection) {
    if (!confirm('Delete this operation?')) return;
    
    try {
        await db.collection(collection).doc(id).delete();
        await loadData();
    } catch (error) {
        console.error("Delete error:", error);
        alert("Delete failed");
    }
}

// ========== تصدير إلى CSV ==========
function exportToCSV() {
    if (filteredOps.length === 0) {
        alert('No data to export');
        return;
    }
    
    let csv = 'Type,Sender,Receiver,Amount,Description,Date,Status\n';
    filteredOps.forEach(op => {
        csv += `${op.type},${op.sender},${op.receiver},${op.amount},${op.description.replace(/,/g, ';')},${op.date},${op.status}\n`;
    });
    
    const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
    const link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = `operations_${new Date().toISOString().slice(0,10)}.csv`;
    link.click();
}

// ========== عرض الخطأ ==========
function showError(msg) {
    tableBody.innerHTML = `
        <tr>
            <td colspan="8">
                <div class="no-data-ops">
                    <div class="no-data-icon">❌</div>
                    ${msg}
                </div>
            </td>
        </tr>
    `;
}

// ========== مستمعات الأحداث ==========
typeFilter.addEventListener('change', applyFilters);
personFilter.addEventListener('change', applyFilters);
searchInput.addEventListener('input', applyFilters);
itemsPerPageSelect.addEventListener('change', () => {
    itemsPerPage = parseInt(itemsPerPageSelect.value);
    currentPage = 1;
    renderTable();
});

clearFiltersBtn.addEventListener('click', () => {
    typeFilter.value = 'all';
    personFilter.value = 'all';
    searchInput.value = '';
    applyFilters();
});

// ========== بدء التطبيق ==========
loadData();
setupListener();

// ========== دوال عامة ==========
window.deleteOp = deleteOp;
window.changePage = changePage;
window.exportToCSV = exportToCSV;
window.goToAdmin = goToAdmin;
window.logout = logout;
</script>
