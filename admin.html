<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>
<style>
body { font-family: Arial; padding: 20px; }
table { width:100%; border-collapse: collapse; margin-top:20px; }
th, td { border:1px solid #ccc; padding:8px; text-align:left; }
th { background-color:#f2f2f2; }
</style>
</head>
<body>
<h2>Admin Panel - Orders</h2>
<table id="ordersTable">
  <thead>
    <tr>
      <th>Main Person</th>
      <th>Secondary Person</th>
      <th>Price (MAD)</th>
      <th>Description</th>
      <th>Time</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<script src="https://www.gstatic.com/firebasejs/10.6.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.6.2/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCh8ssk6K7_LXDPpG3X85Z7VlUwDa_0_Og",
  authDomain: "deliverymarrakech.firebaseapp.com",
  projectId: "deliverymarrakech",
  storageBucket: "deliverymarrakech.firebasestorage.app",
  messagingSenderId: "543072772322",
  appId: "1:543072772322:web:468d0c047e06c86bde7ebb",
  measurementId: "G-YMXBJFJ9N8"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const tbody = document.querySelector("#ordersTable tbody");

// Listen to Firestore
db.collection("orders").orderBy("timestamp","desc").onSnapshot(snapshot => {
  tbody.innerHTML = "";
  snapshot.forEach(doc => {
    const data = doc.data();
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td>${data.mainPerson}</td>
      <td>${data.secondaryPerson}</td>
      <td>${data.price}</td>
      <td>${data.description}</td>
      <td>${data.timestamp ? data.timestamp.toDate().toLocaleString() : ''}</td>
    `;
    tbody.appendChild(tr);
  });
});
</script>
</body>
</html>
