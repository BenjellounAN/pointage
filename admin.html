<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
<title>Admin Panel · Wallet Popup</title>

<style>
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

body{
font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
background: #f0f2f5;
padding: 12px;
margin:0;
min-height: 100vh;
}

h1{
text-align:center;
color:#1a1a1a;
margin: 15px 0 20px;
font-size: 1.8em;
}

/* ========== HEADER ACTIONS معاد تصميمها ========== */
.header-actions {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-bottom: 25px;
    gap: 15px;
    background: white;
    padding: 20px 25px;
    border-radius: 60px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    border: 1px solid #e9ecf0;
}

/* الصف العلوي - Back و Logout في الوسط */
.top-row {
    display: flex;
    gap: 20px;
    justify-content: center;
    align-items: center;
    width: 100%;
}

/* الصف السفلي - باقي الأزرار أفقية */
.bottom-row {
    display: flex;
    gap: 15px;
    justify-content: center;
    align-items: center;
    flex-wrap: wrap;
    width: 100%;
    padding-top: 10px;
    border-top: 2px dashed #e0e7f0;
}

/* ========== تصميم موحد لجميع الأزرار ========== */
.action-btn {
    padding: 12px 24px;
    border: none;
    border-radius: 40px;
    cursor: pointer;
    font-weight: 600;
    font-size: 0.95rem;
    display: inline-flex;
    align-items: center;
    gap: 10px;
    transition: all 0.3s ease;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    letter-spacing: 0.3px;
    position: relative;
    overflow: hidden;
}

.action-btn::before {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    width: 0;
    height: 0;
    border-radius: 50%;
    background: rgba(255,255,255,0.2);
    transform: translate(-50%, -50%);
    transition: width 0.5s, height 0.5s;
}

.action-btn:hover::before {
    width: 300px;
    height: 300px;
}

.action-btn:active {
    transform: translateY(2px);
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}

.action-btn svg {
    width: 18px;
    height: 18px;
    fill: currentColor;
}

/* ألوان الأزرار المختلفة */
.back-btn {
    background: linear-gradient(135deg, #6c757d, #5a6268);
    color: white;
    min-width: 120px;
}

.refresh-btn {
    background: linear-gradient(135deg, #2196f3, #1976d2);
    color: white;
}

.send-wallet-btn {
    background: linear-gradient(135deg, #9c27b0, #7b1fa2);
    color: white;
    padding: 14px 32px;
    font-size: 1.1rem;
    box-shadow: 0 8px 20px rgba(156,39,176,0.4);
}

.view-wallet-btn {
    background: linear-gradient(135deg, #2d5f7e, #1d4e6b);
    color: white;
    padding: 14px 32px;
    font-size: 1.1rem;
    box-shadow: 0 8px 20px rgba(45,95,126,0.4);
}

.logout-btn {
    background: linear-gradient(135deg, #dc3545, #c82333);
    color: white;
    min-width: 120px;
}

/* الأزرار الرئيسية أيقونات أكبر */
.send-wallet-btn svg, .view-wallet-btn svg {
    width: 22px;
    height: 22px;
}

/* ========== Table Container ========== */
.table-container{
overflow-x: auto;
border-radius: 24px;
box-shadow:0 4px 20px rgba(0,0,0,0.08);
margin-bottom: 25px;
background: white;
border: 1px solid #e9ecf0;
}

table{
width:100%;
border-collapse:collapse;
background:white;
font-size: 14px;
min-width: 700px;
}

th,td{
padding:16px 12px;
border:1px solid #edf2f7;
text-align:center;
}

th{
background:linear-gradient(135deg, #2c3e50, #1e2b3a);
color:white;
font-weight:600;
font-size: 13px;
white-space: nowrap;
letter-spacing: 0.5px;
}

tr:nth-child(even){
background:#f8fafd;
}

tr:hover{
background:#e3f2fd;
}

/* Person badges */
.person-badge {
    display: inline-block;
    padding: 6px 16px;
    border-radius: 30px;
    font-weight: 600;
    font-size: 12px;
    min-width: 90px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.05);
}

.person-anas { background: #ffebee; color: #c62828; border-left: 4px solid #c62828; }
.person-ous { background: #e3f2fd; color: #1565c0; border-left: 4px solid #1565c0; }
.person-amine { background: #fffde7; color: #9e6b0c; border-left: 4px solid #9e6b0c; }
.person-houssam { background: #fff3e0; color: #bf5e00; border-left: 4px solid #bf5e00; }
.person-zaki { background: #e8f5e9; color: #2e7d32; border-left: 4px solid #2e7d32; }
.person-mohamed { background: #f3e5f5; color: #6a1b9a; border-left: 4px solid #6a1b9a; }

/* Delete button */
.deleteBtn {
    background: #ff5252;
    color: white;
    border: none;
    width: 38px;
    height: 38px;
    border-radius: 12px;
    cursor: pointer;
    font-size: 1.2em;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    box-shadow: 0 4px 10px rgba(255,82,82,0.3);
}

.deleteBtn:hover {
    background: #d32f2f;
    transform: scale(1.1) rotate(5deg);
}

.deleteBtn:active {
    transform: scale(0.9);
}

/* Summary Section */
.summary{
display: grid;
grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
gap: 15px;
margin: 25px 0 20px;
}

.box{
background: white;
padding: 15px 10px;
border-radius: 20px;
box-shadow:0 4px 15px rgba(0,0,0,0.05);
font-weight: 500;
font-size: 0.95em;
text-align: center;
border: 1px solid #eef2f6;
transition: all 0.3s;
backdrop-filter: blur(5px);
}

.box:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 25px rgba(0,0,0,0.1);
}

.box span{
display: block;
font-size: 1.5em;
font-weight: 700;
margin-top: 8px;
color: #1e2b3a;
}

/* Person-specific summary colors */
.box[data-person="anas"] { 
    border-bottom: 4px solid #c62828;
    background: linear-gradient(to bottom, #ffffff, #ffebee);
}
.box[data-person="oussama"] { 
    border-bottom: 4px solid #1565c0;
    background: linear-gradient(to bottom, #ffffff, #e3f2fd);
}
.box[data-person="amine"] { 
    border-bottom: 4px solid #9e6b0c;
    background: linear-gradient(to bottom, #ffffff, #fffde7);
}
.box[data-person="houssam"] { 
    border-bottom: 4px solid #bf5e00;
    background: linear-gradient(to bottom, #ffffff, #fff3e0);
}
.box[data-person="zaki"] { 
    border-bottom: 4px solid #2e7d32;
    background: linear-gradient(to bottom, #ffffff, #e8f5e9);
}
.box[data-person="mohamed"] { 
    border-bottom: 4px solid #6a1b9a;
    background: linear-gradient(to bottom, #ffffff, #f3e5f5);
}

.box small {
    color: #666;
    font-size: 0.75em;
    display: block;
    margin-top: 5px;
}

/* ========== POPUP MODAL (Full screen) ========== */
.wallet-popup {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(255,255,255,0.98);
    z-index: 9999;
    overflow-y: auto;
    padding: 30px 20px;
    animation: fadeIn 0.3s ease;
}

@keyframes fadeIn {
    from { opacity: 0; transform: scale(0.95); }
    to { opacity: 1; transform: scale(1); }
}

.popup-content {
    max-width: 1300px;
    margin: 0 auto;
    position: relative;
    min-height: 100%;
}

/* Close button X */
.close-popup-btn {
    position: absolute;
    top: 0;
    right: 0;
    background: linear-gradient(135deg, #f44336, #d32f2f);
    color: white;
    border: none;
    width: 55px;
    height: 55px;
    border-radius: 50%;
    font-size: 32px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 10px 25px rgba(244,67,54,0.4);
    transition: all 0.3s;
    z-index: 10000;
}

.close-popup-btn:hover {
    transform: rotate(90deg) scale(1.1);
    background: linear-gradient(135deg, #d32f2f, #b71c1c);
}

.popup-title {
    font-size: 2.5rem;
    color: #1e2b3a;
    margin: 20px 0 40px;
    padding-right: 70px;
    border-bottom: 4px solid #9c27b0;
    padding-bottom: 15px;
    display: inline-block;
    background: linear-gradient(135deg, #9c27b0, #6a1b9a);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    font-weight: 800;
}

.popup-wallet-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 30px;
    margin: 40px 0;
}

.popup-wallet-card {
    background: white;
    border-radius: 30px;
    padding: 35px 25px;
    text-align: center;
    box-shadow: 0 15px 35px rgba(0,0,0,0.1);
    border: 1px solid #eef2f6;
    transition: all 0.4s;
    position: relative;
    overflow: hidden;
}

.popup-wallet-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 6px;
    background: linear-gradient(90deg, #9c27b0, #ff9800);
}

.popup-wallet-card:hover {
    transform: translateY(-10px) scale(1.02);
    box-shadow: 0 25px 50px rgba(0,0,0,0.15);
}

.popup-wallet-card .card-person {
    font-size: 2rem;
    font-weight: 700;
    margin-bottom: 20px;
    padding: 12px 25px;
    display: inline-block;
    border-radius: 50px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.05);
}

.popup-wallet-card .card-amount {
    font-size: 4rem;
    font-weight: 800;
    line-height: 1.2;
    margin: 15px 0 5px;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
}

.popup-wallet-card .card-currency {
    font-size: 1.2rem;
    color: #666;
    font-weight: 500;
}

.popup-timestamp {
    text-align: center;
    font-size: 1.3rem;
    color: #2c3e50;
    background: linear-gradient(135deg, #e3f2fd, #bbdefb);
    padding: 18px 35px;
    border-radius: 60px;
    display: inline-block;
    margin: 40px 0 20px;
    font-weight: 600;
    box-shadow: 0 5px 15px rgba(0,0,0,0.05);
}

.popup-no-data {
    text-align: center;
    padding: 100px 20px;
    font-size: 2rem;
    color: #999;
    background: #f8f9fa;
    border-radius: 50px;
}

.popup-no-data .icon {
    font-size: 6rem;
    margin-bottom: 25px;
    display: block;
}

/* No data state for table */
.no-data{
text-align:center;
padding:60px 20px;
background:white;
border-radius:24px;
color:#666;
font-size:1.2em;
border: 1px solid #e9ecf0;
}

.no-data-icon{
font-size:4em;
margin-bottom:20px;
opacity:0.5;
}

/* Responsive */
@media (max-width: 768px) {
    .header-actions {
        border-radius: 30px;
        padding: 15px;
    }
    
    .top-row {
        gap: 10px;
    }
    
    .bottom-row {
        gap: 10px;
    }
    
    .send-wallet-btn, .view-wallet-btn {
        padding: 12px 20px;
        font-size: 1rem;
    }
    
    .back-btn, .logout-btn {
        min-width: 100px;
    }
    
    .summary {
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
    }
    
    .box {
        padding: 10px 5px;
    }
    
    .box span {
        font-size: 1.2em;
    }
    
    .popup-wallet-grid {
        grid-template-columns: 1fr;
    }
    
    .popup-title {
        font-size: 1.8rem;
    }
}

@media (min-width: 769px) and (max-width: 1024px) {
    .popup-wallet-grid {
        grid-template-columns: repeat(2, 1fr);
    }
}

/* Scrollbar styling */
::-webkit-scrollbar {
    width: 12px;
    height: 12px;
}

::-webkit-scrollbar-track {
    background: #f1f1f1;
    border-radius: 10px;
}

::-webkit-scrollbar-thumb {
    background: linear-gradient(135deg, #2c3e50, #1a252f);
    border-radius: 10px;
}

::-webkit-scrollbar-thumb:hover {
    background: linear-gradient(135deg, #1a252f, #0f1a22);
}

</style>
</head>
<body>

<!-- Header Actions معاد تصميمها - Back و Logout في الوسط -->
<div class="header-actions">
    <!-- الصف العلوي: Back و Logout في الوسط -->
    <div class="top-row">
        <button class="action-btn back-btn" onclick="window.location.href='index.html'">
            <svg viewBox="0 0 24 24">
                <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/>
            </svg>
            <span>Back</span>
        </button>
        
        <button class="action-btn logout-btn" onclick="logout()">
            <span>🚪</span>
            <span>Logout</span>
        </button>
    </div>
    
    <!-- الصف السفلي: باقي الأزرار أفقية -->
    <div class="bottom-row">
        <button class="action-btn refresh-btn" onclick="window.location.reload()">
            <span>🔄</span>
            <span>Refresh</span>
        </button>
        
        <button class="action-btn send-wallet-btn" id="sendWalletBtn">
            <svg viewBox="0 0 24 24">
                <path d="M4 6h16v2H4V6zm2-4h12v2H6V2zm16 7H2v12h20V9zm-4 7h-4v-2h4v2z"/>
                <circle cx="18" cy="16" r="2" fill="white" opacity="0.3"/>
            </svg>
            <span>Send Wallet</span>
        </button>
        
        <button class="action-btn view-wallet-btn" id="viewWalletBtn">
            <svg viewBox="0 0 24 24">
                <path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5z"/>
                <circle cx="12" cy="12" r="2.5" fill="white" opacity="0.5"/>
            </svg>
            <span>View Wallet</span>
        </button>
    </div>
</div>

<h1>💰 Admin Panel · Members Wallet</h1>

<!-- Summary Section -->
<div class="summary" id="summaryContainer">
    <div class="box" data-person="anas">
        Anas <span id="anasTotal">0.00</span> <small>MAD</small>
    </div>
    <div class="box" data-person="oussama">
        Oussama <span id="oussamaTotal">0.00</span> <small>MAD</small>
    </div>
    <div class="box" data-person="amine">
        Amine <span id="amineTotal">0.00</span> <small>MAD</small>
    </div>
    <div class="box" data-person="houssam">
        Houssam <span id="houssamTotal">0.00</span> <small>MAD</small>
    </div>
    <div class="box" data-person="zaki">
        Zaki <span id="zakiTotal">0.00</span> <small>MAD</small>
    </div>
    <div class="box" data-person="mohamed">
        Mohamed <span id="mohamedTotal">0.00</span> <small>MAD</small>
    </div>
</div>

<!-- POPUP Modal (Full screen) -->
<div class="wallet-popup" id="walletPopup">
    <div class="popup-content">
        <button class="close-popup-btn" id="closePopupBtn">&times;</button>
        <h2 class="popup-title" id="popupTitle">📦 Wallet History</h2>
        <div class="popup-wallet-grid" id="popupWalletGrid"></div>
        <div class="popup-timestamp" id="popupTimestamp"></div>
    </div>
</div>

<!-- Table Container -->
<div class="table-container">
    <table>
        <thead>
            <tr>
                <th>Main</th>
                <th>Second</th>
                <th>Price (MAD)</th>
                <th>Description</th>
                <th>Time</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
// Check authentication
if (sessionStorage.getItem('isAuthenticated') !== 'true') {
    window.location.href = 'login.html';
}

function logout() {
    sessionStorage.removeItem('isAuthenticated');
    window.location.href = 'login.html';
}

const firebaseConfig = {
    apiKey: "AIzaSyCh8ssk6K7_LXDPpG3X85Z7VlUwDa_0_Og",
    authDomain: "deliverymarrakech.firebaseapp.com",
    projectId: "deliverymarrakech",
    storageBucket: "deliverymarrakech.firebasestorage.app",
    messagingSenderId: "543072772322",
    appId: "1:543072772322:web:468d0c047e06c86bde7ebb",
    measurementId: "G-YMXBJFJ9N8"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const tableBody = document.getElementById("tableBody");

function getPersonClass(person) {
    switch(person?.toLowerCase()) {
        case "anas": return "person-anas"
        case "oussama": return "person-ous"
        case "amine": return "person-amine"
        case "houssam": return "person-houssam"
        case "zaki": return "person-zaki"
        case "mohamed": return "person-mohamed"
        default: return ""
    }
}

let lastTotals = { anas: 0, oussama: 0, amine: 0, houssam: 0, zaki: 0, mohamed: 0 };

db.collection("payments")
.orderBy("time", "desc")
.onSnapshot(function(snapshot){
    tableBody.innerHTML = "";
    let totals = { anas: 0, oussama: 0, amine: 0, houssam: 0, zaki: 0, mohamed: 0 };

    if (snapshot.empty) {
        let row = document.createElement("tr");
        row.innerHTML = `<td colspan="6"><div class="no-data"><div class="no-data-icon">📭</div>No payment records found</div></td>`;
        tableBody.appendChild(row);
    } else {
        snapshot.forEach(function(doc){
            let data = doc.data();
            let row = document.createElement("tr");
            let price = parseFloat(data.price) || 0;
            let half = price / 2;
            let mainClass = getPersonClass(data.name1);
            let secondClass = getPersonClass(data.name2);
            
            if(data.name1?.toLowerCase() === "anas") totals.anas += half;
            if(data.name1?.toLowerCase() === "oussama") totals.oussama += half;
            if(data.name1?.toLowerCase() === "amine") totals.amine += half;
            if(data.name2?.toLowerCase() === "houssam") totals.houssam += half;
            if(data.name2?.toLowerCase() === "zaki") totals.zaki += half;
            if(data.name1?.toLowerCase() === "mohamed") totals.mohamed += half;
            if(data.name2?.toLowerCase() === "mohamed") totals.mohamed += half;

            row.innerHTML = `
            <td><span class="person-badge ${mainClass}">${data.name1 || 'N/A'}</span></td>
            <td><span class="person-badge ${secondClass}">${data.name2 || 'N/A'}</span></td>
            <td><strong>${price.toFixed(2)}</strong></td>
            <td>${data.description || '-'}</td>
            <td>${data.time ? new Date(data.time.seconds * 1000).toLocaleString() : 'N/A'}</td>
            <td><button class="deleteBtn" onclick="deleteDoc('${doc.id}')">🗑️</button></td>
            `;
            tableBody.appendChild(row);
        });
    }

    lastTotals = { ...totals };
    document.getElementById("anasTotal").innerText = totals.anas.toFixed(2);
    document.getElementById("oussamaTotal").innerText = totals.oussama.toFixed(2);
    document.getElementById("amineTotal").innerText = totals.amine.toFixed(2);
    document.getElementById("houssamTotal").innerText = totals.houssam.toFixed(2);
    document.getElementById("zakiTotal").innerText = totals.zaki.toFixed(2);
    document.getElementById("mohamedTotal").innerText = totals.mohamed.toFixed(2);
});

function deleteDoc(id) {
    if (confirm('Are you sure you want to delete this record? This action cannot be undone.')) {
        db.collection("payments").doc(id).delete()
            .then(() => console.log("Document deleted"))
            .catch(err => alert("Error: " + err));
    }
}

// ========== POPUP FUNCTIONS ==========
const walletPopup = document.getElementById('walletPopup');
const popupWalletGrid = document.getElementById('popupWalletGrid');
const popupTimestamp = document.getElementById('popupTimestamp');
const closePopupBtn = document.getElementById('closePopupBtn');
const popupTitle = document.getElementById('popupTitle');

// Close popup when clicking X
closePopupBtn.addEventListener('click', function() {
    walletPopup.style.display = 'none';
});

// Close popup when pressing ESC key
document.addEventListener('keydown', function(event) {
    if (event.key === 'Escape' && walletPopup.style.display === 'block') {
        walletPopup.style.display = 'none';
    }
});

// Function to show wallet data in popup
function showWalletInPopup(archive) {
    const t = archive.totals || {};
    
    const personMap = [
        { label: 'Anas', key: 'anas', class: 'person-anas', color: '#c62828' },
        { label: 'Oussama', key: 'oussama', class: 'person-ous', color: '#1565c0' },
        { label: 'Amine', key: 'amine', class: 'person-amine', color: '#9e6b0c' },
        { label: 'Houssam', key: 'houssam', class: 'person-houssam', color: '#bf5e00' },
        { label: 'Zaki', key: 'zaki', class: 'person-zaki', color: '#2e7d32' },
        { label: 'Mohamed', key: 'mohamed', class: 'person-mohamed', color: '#6a1b9a' }
    ];
    
    let htmlStr = '';
    let hasData = false;
    
    personMap.forEach(p => {
        let amount = (t[p.key] || 0).toFixed(2);
        if (parseFloat(amount) > 0) hasData = true;
        
        htmlStr += `
            <div class="popup-wallet-card">
                <div class="card-person person-badge ${p.class}">${p.label}</div>
                <div class="card-amount" style="color: ${p.color}">${amount}</div>
                <div class="card-currency">MAD</div>
            </div>
        `;
    });
    
    if (!hasData && Object.keys(t).length === 0) {
        htmlStr = `
            <div class="popup-no-data">
                <span class="icon">📭</span>
                No wallet data available
            </div>
        `;
    }
    
    popupWalletGrid.innerHTML = htmlStr;
    popupTimestamp.innerText = `📅 ${archive.formattedDate || archive.timestamp || 'Unknown date'}`;
    walletPopup.style.display = 'block';
    walletPopup.scrollTop = 0;
}

// ========== FIREBASE WALLET FUNCTIONS ==========
const sendBtn = document.getElementById('sendWalletBtn');
const viewBtn = document.getElementById('viewWalletBtn');

async function loadLatestWalletSnapshot() {
    try {
        const snapshot = await db.collection("wallet_snapshots")
            .orderBy("timestamp", "desc")
            .limit(1)
            .get();
        
        if (!snapshot.empty) {
            const data = snapshot.docs[0].data();
            let formattedDate = 'Unknown date';
            if (data.timestamp) {
                const date = data.timestamp.toDate ? data.timestamp.toDate() : new Date(data.timestamp);
                formattedDate = date.toLocaleString('en-US', { 
                    year: 'numeric', 
                    month: 'long', 
                    day: 'numeric',
                    hour: '2-digit',
                    minute: '2-digit',
                    second: '2-digit'
                });
            }
            
            return {
                totals: data.totals || {},
                timestamp: data.timestamp,
                formattedDate: formattedDate
            };
        }
        return null;
    } catch (error) {
        console.error("Error loading wallet snapshot: ", error);
        return null;
    }
}

sendBtn.addEventListener('click', async function() {
    const totalsCopy = { ...lastTotals };
    const now = new Date();
    
    const walletData = {
        totals: totalsCopy,
        timestamp: firebase.firestore.FieldValue.serverTimestamp(),
        createdAt: now.toISOString(),
        formattedDate: now.toLocaleString('en-US', { 
            year: 'numeric', 
            month: 'long', 
            day: 'numeric',
            hour: '2-digit',
            minute: '2-digit',
            second: '2-digit'
        })
    };
    
    try {
        sendBtn.innerHTML = `<span>⏳</span> Sending...`;
        sendBtn.disabled = true;
        
        await db.collection("wallet_snapshots").add(walletData);
        
        const archive = await loadLatestWalletSnapshot();
        if (archive) {
            showWalletInPopup(archive);
        }
        
        document.getElementById("anasTotal").innerText = '0.00';
        document.getElementById("oussamaTotal").innerText = '0.00';
        document.getElementById("amineTotal").innerText = '0.00';
        document.getElementById("houssamTotal").innerText = '0.00';
        document.getElementById("zakiTotal").innerText = '0.00';
        document.getElementById("mohamedTotal").innerText = '0.00';
        
        sendBtn.innerHTML = `<svg viewBox="0 0 24 24"><path d="M4 6h16v2H4V6zm2-4h12v2H6V2zm16 7H2v12h20V9zm-4 7h-4v-2h4v2z"/><circle cx="18" cy="16" r="2" fill="white" opacity="0.3"/></svg> Sent ✓`;
        setTimeout(() => {
            sendBtn.innerHTML = `<svg viewBox="0 0 24 24"><path d="M4 6h16v2H4V6zm2-4h12v2H6V2zm16 7H2v12h20V9zm-4 7h-4v-2h4v2z"/><circle cx="18" cy="16" r="2" fill="white" opacity="0.3"/></svg> Send Wallet`;
            sendBtn.disabled = false;
        }, 1500);
        
    } catch (error) {
        console.error("Error saving wallet snapshot: ", error);
        alert("Failed to save wallet. Check connection.");
        sendBtn.innerHTML = `<svg viewBox="0 0 24 24"><path d="M4 6h16v2H4V6zm2-4h12v2H6V2zm16 7H2v12h20V9zm-4 7h-4v-2h4v2z"/><circle cx="18" cy="16" r="2" fill="white" opacity="0.3"/></svg> Send Wallet`;
        sendBtn.disabled = false;
    }
});

viewBtn.addEventListener('click', async function() {
    try {
        viewBtn.innerHTML = `<span>⏳</span> Loading...`;
        viewBtn.disabled = true;
        
        const archive = await loadLatestWalletSnapshot();
        
        if (archive) {
            showWalletInPopup(archive);
        } else {
            showWalletInPopup({ totals: {}, formattedDate: 'No saved snapshots' });
        }
        
        setTimeout(() => {
            viewBtn.innerHTML = `<svg viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5z"/><circle cx="12" cy="12" r="2.5" fill="white" opacity="0.5"/></svg> View Wallet`;
            viewBtn.disabled = false;
        }, 800);
    } catch (error) {
        console.error("Error loading snapshot: ", error);
        alert("Could not load wallet.");

        viewBtn.disabled = false;
    }
});
