<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
<title>Admin Panel · Cumulative Wallet System</title>

<style>
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

body{
font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
background: #f0f2f5;
padding: 12px;
margin:0;
min-height: 100vh;
}

h1{
text-align:center;
color:#1a1a1a;
margin: 15px 0 20px;
font-size: 1.8em;
}

/* Header Actions */
.header-actions {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-bottom: 25px;
    gap: 15px;
    background: white;
    padding: 20px 25px;
    border-radius: 60px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    border: 1px solid #e9ecf0;
}

.top-row {
    display: flex;
    gap: 20px;
    justify-content: center;
    align-items: center;
    width: 100%;
}

.bottom-row {
    display: flex;
    gap: 15px;
    justify-content: center;
    align-items: center;
    flex-wrap: wrap;
    width: 100%;
    padding-top: 10px;
    border-top: 2px dashed #e0e7f0;
}

.action-btn {
    padding: 12px 24px;
    border: none;
    border-radius: 40px;
    cursor: pointer;
    font-weight: 600;
    font-size: 0.95rem;
    display: inline-flex;
    align-items: center;
    gap: 10px;
    transition: all 0.3s ease;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    letter-spacing: 0.3px;
    position: relative;
    overflow: hidden;
}

.action-btn::before {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    width: 0;
    height: 0;
    border-radius: 50%;
    background: rgba(255,255,255,0.2);
    transform: translate(-50%, -50%);
    transition: width 0.5s, height 0.5s;
}

.action-btn:hover::before {
    width: 300px;
    height: 300px;
}

.action-btn:active {
    transform: translateY(2px);
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}

.action-btn svg {
    width: 18px;
    height: 18px;
    fill: currentColor;
}

.back-btn {
    background: linear-gradient(135deg, #6c757d, #5a6268);
    color: white;
    min-width: 120px;
}

.refresh-btn {
    background: linear-gradient(135deg, #2196f3, #1976d2);
    color: white;
}

.send-wallet-btn {
    background: linear-gradient(135deg, #9c27b0, #7b1fa2);
    color: white;
    padding: 14px 32px;
    font-size: 1.1rem;
    box-shadow: 0 8px 20px rgba(156,39,176,0.4);
}

.view-wallet-btn {
    background: linear-gradient(135deg, #2d5f7e, #1d4e6b);
    color: white;
    padding: 14px 32px;
    font-size: 1.1rem;
    box-shadow: 0 8px 20px rgba(45,95,126,0.4);
}

.logout-btn {
    background: linear-gradient(135deg, #dc3545, #c82333);
    color: white;
    min-width: 120px;
}

.send-wallet-btn svg, .view-wallet-btn svg {
    width: 22px;
    height: 22px;
}

/* Summary Section - Current Totals */
.summary{
display: grid;
grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
gap: 15px;
margin: 25px 0 20px;
}

.box{
background: white;
padding: 15px 10px;
border-radius: 20px;
box-shadow:0 4px 15px rgba(0,0,0,0.05);
font-weight: 500;
font-size: 0.95em;
text-align: center;
border: 1px solid #eef2f6;
transition: all 0.3s;
}

.box:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 25px rgba(0,0,0,0.1);
}

.box span{
display: block;
font-size: 1.5em;
font-weight: 700;
margin-top: 8px;
color: #1e2b3a;
}

.box[data-person="anas"] { border-bottom: 4px solid #c62828; background: linear-gradient(to bottom, #ffffff, #ffebee); }
.box[data-person="oussama"] { border-bottom: 4px solid #1565c0; background: linear-gradient(to bottom, #ffffff, #e3f2fd); }
.box[data-person="amine"] { border-bottom: 4px solid #9e6b0c; background: linear-gradient(to bottom, #ffffff, #fffde7); }
.box[data-person="houssam"] { border-bottom: 4px solid #bf5e00; background: linear-gradient(to bottom, #ffffff, #fff3e0); }
.box[data-person="zaki"] { border-bottom: 4px solid #2e7d32; background: linear-gradient(to bottom, #ffffff, #e8f5e9); }
.box[data-person="mohamed"] { border-bottom: 4px solid #6a1b9a; background: linear-gradient(to bottom, #ffffff, #f3e5f5); }

.box small {
    color: #666;
    font-size: 0.75em;
    display: block;
    margin-top: 5px;
}

/* Table Container */
.table-container{
overflow-x: auto;
border-radius: 24px;
box-shadow:0 4px 20px rgba(0,0,0,0.08);
margin-bottom: 25px;
background: white;
border: 1px solid #e9ecf0;
}

table{
width:100%;
border-collapse:collapse;
background:white;
font-size: 14px;
min-width: 700px;
}

th,td{
padding:16px 12px;
border:1px solid #edf2f7;
text-align:center;
}

th{
background:linear-gradient(135deg, #2c3e50, #1e2b3a);
color:white;
font-weight:600;
font-size: 13px;
white-space: nowrap;
letter-spacing: 0.5px;
}

tr:nth-child(even){
background:#f8fafd;
}

tr:hover{
background:#e3f2fd;
}

.person-badge {
    display: inline-block;
    padding: 6px 16px;
    border-radius: 30px;
    font-weight: 600;
    font-size: 12px;
    min-width: 90px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.05);
}

.person-anas { background: #ffebee; color: #c62828; border-left: 4px solid #c62828; }
.person-ous { background: #e3f2fd; color: #1565c0; border-left: 4px solid #1565c0; }
.person-amine { background: #fffde7; color: #9e6b0c; border-left: 4px solid #9e6b0c; }
.person-houssam { background: #fff3e0; color: #bf5e00; border-left: 4px solid #bf5e00; }
.person-zaki { background: #e8f5e9; color: #2e7d32; border-left: 4px solid #2e7d32; }
.person-mohamed { background: #f3e5f5; color: #6a1b9a; border-left: 4px solid #6a1b9a; }

.deleteBtn {
    background: #ff5252;
    color: white;
    border: none;
    width: 38px;
    height: 38px;
    border-radius: 12px;
    cursor: pointer;
    font-size: 1.2em;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    box-shadow: 0 4px 10px rgba(255,82,82,0.3);
}

.deleteBtn:hover {
    background: #d32f2f;
    transform: scale(1.1) rotate(5deg);
}

.deleteBtn:active {
    transform: scale(0.9);
}

/* View Details Button */
.view-details-btn {
    background: #2196f3;
    color: white;
    border: none;
    padding: 8px 16px;
    border-radius: 30px;
    cursor: pointer;
    font-weight: 500;
    font-size: 13px;
    display: inline-flex;
    align-items: center;
    gap: 5px;
    transition: all 0.3s;
    box-shadow: 0 4px 10px rgba(33,150,243,0.3);
}

.view-details-btn:hover {
    background: #1976d2;
    transform: translateY(-2px);
    box-shadow: 0 6px 15px rgba(33,150,243,0.4);
}

.view-details-btn svg {
    width: 16px;
    height: 16px;
    fill: currentColor;
}

/* ========== WALLET MODAL - HORIZONTAL MEMBERS WITH VERTICAL ENTRIES ========== */
.wallet-modal {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    z-index: 10000;
    overflow-y: auto;
    padding: 20px;
    animation: fadeIn 0.3s ease;
}

@keyframes fadeIn {
    from { opacity: 0; transform: scale(0.98); }
    to { opacity: 1; transform: scale(1); }
}

.modal-content {
    max-width: 1400px;
    margin: 20px auto;
    position: relative;
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
    border-radius: 40px;
    padding: 30px;
    border: 1px solid rgba(255,255,255,0.2);
}

.close-modal-btn {
    position: absolute;
    top: 15px;
    right: 20px;
    background: linear-gradient(135deg, #f44336, #d32f2f);
    color: white;
    border: none;
    width: 45px;
    height: 45px;
    border-radius: 25px;
    font-size: 28px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 10px 25px rgba(244,67,54,0.4);
    transition: all 0.3s;
    z-index: 10001;
}

.close-modal-btn:hover {
    transform: rotate(90deg) scale(1.1);
}

.modal-header {
    margin-bottom: 30px;
    padding-right: 60px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.modal-header h2 {
    font-size: 2rem;
    color: white;
    font-weight: 700;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
    display: inline-block;
    border-bottom: 3px solid rgba(255,255,255,0.3);
    padding-bottom: 10px;
}

.total-transfers-badge {
    background: rgba(255,255,255,0.2);
    backdrop-filter: blur(5px);
    padding: 10px 20px;
    border-radius: 50px;
    color: white;
    font-size: 1.1rem;
    border: 1px solid rgba(255,255,255,0.3);
}

/* HORIZONTAL MEMBERS CONTAINER */
.members-horizontal-container {
    display: flex;
    flex-wrap: wrap;
    gap: 20px;
    justify-content: center;
    margin: 20px 0;
}

/* MEMBER CARD - كل عضو في بطاقة أفقية */
.member-card {
    background: white;
    border-radius: 24px;
    width: 220px;
    min-width: 200px;
    flex: 1 1 auto;
    max-width: 250px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.15);
    overflow: hidden;
    transition: transform 0.3s;
}

.member-card:hover {
    transform: translateY(-5px);
    box-shadow: 0 25px 50px rgba(0,0,0,0.2);
}

/* Member Header */
.member-header {
    padding: 15px;
    text-align: center;
    color: white;
    font-weight: 700;
    font-size: 1.3rem;
    position: relative;
}

.member-total {
    font-size: 0.8rem;
    opacity: 0.9;
    margin-top: 5px;
    background: rgba(255,255,255,0.2);
    padding: 3px 8px;
    border-radius: 20px;
    display: inline-block;
}

.header-anas { background: linear-gradient(135deg, #c62828, #b71c1c); }
.header-oussama { background: linear-gradient(135deg, #1565c0, #0d47a1); }
.header-amine { background: linear-gradient(135deg, #9e6b0c, #7f5a0a); }
.header-houssam { background: linear-gradient(135deg, #bf5e00, #9e4d00); }
.header-zaki { background: linear-gradient(135deg, #2e7d32, #1b5e20); }
.header-mohamed { background: linear-gradient(135deg, #6a1b9a, #4a0072); }

/* Entries Container - التحويلات تحت بعض */
.entries-container {
    padding: 15px;
    max-height: 300px;
    overflow-y: auto;
    background: #f8fafd;
}

/* Individual Entry - كل تحويلة */
.wallet-entry {
    background: white;
    border-radius: 12px;
    padding: 12px;
    margin-bottom: 10px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.03);
    border: 1px solid #edf2f7;
    transition: all 0.2s;
    position: relative;
}

.wallet-entry:hover {
    background: #f0f4fa;
    transform: translateX(3px);
}

.entry-main {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 5px;
}

.entry-amount {
    font-size: 1.2rem;
    font-weight: 700;
    color: #2d3748;
}

.entry-date {
    font-size: 0.7rem;
    color: #718096;
    display: flex;
    align-items: center;
    gap: 3px;
}

.entry-date svg {
    width: 12px;
    height: 12px;
    fill: #718096;
}

/* Delete button for each entry */
.entry-delete {
    background: #ff5252;
    color: white;
    border: none;
    width: 24px;
    height: 24px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 1rem;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    margin-left: 8px;
}

.entry-delete:hover {
    background: #d32f2f;
    transform: scale(1.1);
}

/* No entries */
.no-entries {
    text-align: center;
    padding: 20px;
    color: #a0aec0;
    font-style: italic;
    background: #f7fafc;
    border-radius: 12px;
    font-size: 0.9rem;
}

/* No data state */
.no-data-modal {
    text-align: center;
    padding: 60px;
    color: white;
    background: rgba(255,255,255,0.1);
    border-radius: 30px;
    font-size: 1.2rem;
}

.no-data-icon {
    font-size: 4rem;
    margin-bottom: 20px;
    display: block;
}

.no-data{
text-align:center;
padding:60px 20px;
background:white;
border-radius:24px;
color:#666;
font-size:1.2em;
border: 1px solid #e9ecf0;
}

.no-data-icon{
font-size:4em;
margin-bottom:20px;
opacity:0.5;
}

/* Responsive */
@media (max-width: 768px) {
    .member-card {
        width: 100%;
        max-width: 100%;
    }
}

/* Scrollbar */
::-webkit-scrollbar {
    width: 8px;
}

::-webkit-scrollbar-track {
    background: rgba(255,255,255,0.1);
    border-radius: 10px;
}

::-webkit-scrollbar-thumb {
    background: rgba(255,255,255,0.3);
    border-radius: 10px;
}
</style>
</head>

<h1>💰 Admin Panel · Cumulative Wallet System</h1>

<!-- Current Totals Section -->
<div class="summary" id="summaryContainer">
    <div class="box" data-person="anas">
        Anas <span id="anasTotal">0.00</span> <small>MAD</small>
    </div>
    <div class="box" data-person="oussama">
        Oussama <span id="oussamaTotal">0.00</span> <small>MAD</small>
    </div>
    <div class="box" data-person="amine">
        Amine <span id="amineTotal">0.00</span> <small>MAD</small>
    </div>
    <div class="box" data-person="houssam">
        Houssam <span id="houssamTotal">0.00</span> <small>MAD</small>
    </div>
    <div class="box" data-person="zaki">
        Zaki <span id="zakiTotal">0.00</span> <small>MAD</small>
    </div>

        Mohamed <span id="mohamedTotal">0.00</span> <small>MAD</small>
    </div>

<!-- Table Container -->
<div class="table-container">
    <table>
        <thead>
            <tr>
                <th>Main</th>
                <th>Second</th>

                <th>Description</th>
                <th>Time</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>

<!-- WALLET MODAL - Horizontal Members with Vertical Entries -->
<div class="wallet-modal" id="walletModal">
    <div class="modal-content">
        <button class="close-modal-btn" id="closeModalBtn">&times;</button>
        
        <div class="modal-header">
            <h2>📦 All Transfers History</h2>
            <div class="total-transfers-badge" id="totalTransfersBadge">Total: 0 transfers</div>
        </div>
        
        <!-- Horizontal Members Container -->
        <div class="members-horizontal-container" id="membersContainer">
            <!-- Will be populated dynamically -->
        </div>
    </div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
// Check authentication
if (sessionStorage.getItem('isAuthenticated') !== 'true') {
    window.location.href = 'login.html';
}

function logout() {
    sessionStorage.removeItem('isAuthenticated');
    window.location.href = 'login.html';
}

const firebaseConfig = {
    apiKey: "AIzaSyCh8ssk6K7_LXDPpG3X85Z7VlUwDa_0_Og",
    authDomain: "deliverymarrakech.firebaseapp.com",
    projectId: "deliverymarrakech",
    storageBucket: "deliverymarrakech.firebasestorage.app",
    messagingSenderId: "543072772322",
    appId: "1:543072772322:web:468d0c047e06c86bde7ebb",
    measurementId: "G-YMXBJFJ9N8"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const tableBody = document.getElementById("tableBody");

function getPersonClass(person) {
    switch(person?.toLowerCase()) {
        case "anas": return "person-anas"
        case "oussama": return "person-ous"
        case "amine": return "person-amine"
        case "houssam": return "person-houssam"
        case "zaki": return "person-zaki"
        case "mohamed": return "person-mohamed"
        default: return ""
    }
}

// Current totals (updated in real-time)
let currentTotals = { anas: 0, oussama: 0, amine: 0, houssam: 0, zaki: 0, mohamed: 0 };

// Listen to payments and update table + main totals
db.collection("payments")
.orderBy("time", "desc")
.onSnapshot(function(snapshot){
    tableBody.innerHTML = "";
    let totals = { anas: 0, oussama: 0, amine: 0, houssam: 0, zaki: 0, mohamed: 0 };

    if (snapshot.empty) {
        let row = document.createElement("tr");
        row.innerHTML = `<td colspan="6"><div class="no-data"><div class="no-data-icon">📭</div>No payment records found</div></td>`;
        tableBody.appendChild(row);
    } else {
        snapshot.forEach(function(doc){
            let data = doc.data();
            let row = document.createElement("tr");
            let price = parseFloat(data.price) || 0;
            let half = price / 2;
            let mainClass = getPersonClass(data.name1);
            let secondClass = getPersonClass(data.name2);
            
            // Calculate totals based on names
            if(data.name1?.toLowerCase() === "anas") totals.anas += half;
            if(data.name1?.toLowerCase() === "oussama") totals.oussama += half;
            if(data.name1?.toLowerCase() === "amine") totals.amine += half;
            if(data.name2?.toLowerCase() === "houssam") totals.houssam += half;
            if(data.name2?.toLowerCase() === "zaki") totals.zaki += half;
            if(data.name1?.toLowerCase() === "mohamed") totals.mohamed += half;
            if(data.name2?.toLowerCase() === "mohamed") totals.mohamed += half;

            row.innerHTML = `
            <td><span class="person-badge ${mainClass}">${data.name1 || 'N/A'}</span></td>
            <td><span class="person-badge ${secondClass}">${data.name2 || 'N/A'}</span></td>
            <td><strong>${price.toFixed(2)}</strong></td>
            <td>${data.description || '-'}</td>
            <td>${data.time ? new Date(data.time.seconds * 1000).toLocaleString() : 'N/A'}</td>
            <td>
                <button class="deleteBtn" onclick="deleteDoc('${doc.id}')">🗑️</button>
                <button class="view-details-btn" onclick="showAllTransfers()">
                    <svg viewBox="0 0 24 24">
                        <path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5z"/>
                        <circle cx="12" cy="12" r="2.5"/>
                    </svg>
                    View Details
                </button>
            </td>
            `;
            tableBody.appendChild(row);
        });
    }

    // Update current totals
    currentTotals = { ...totals };
    
    // Update main summary
    document.getElementById("anasTotal").innerText = totals.anas.toFixed(2);
    document.getElementById("oussamaTotal").innerText = totals.oussama.toFixed(2);
    document.getElementById("amineTotal").innerText = totals.amine.toFixed(2);
    document.getElementById("houssamTotal").innerText = totals.houssam.toFixed(2);
    document.getElementById("zakiTotal").innerText = totals.zaki.toFixed(2);
    document.getElementById("mohamedTotal").innerText = totals.mohamed.toFixed(2);
});

// ========== WALLET MODAL FUNCTIONS ==========
const walletModal = document.getElementById('walletModal');
const closeModalBtn = document.getElementById('closeModalBtn');
const membersContainer = document.getElementById('membersContainer');
const totalTransfersBadge = document.getElementById('totalTransfersBadge');

// Close modal
closeModalBtn.addEventListener('click', function() {
    walletModal.style.display = 'none';
});

// Close with ESC
document.addEventListener('keydown', function(event) {
    if (event.key === 'Escape' && walletModal.style.display === 'block') {
        walletModal.style.display = 'none';
    }
});

// Format date function
function formatEntryDate(timestamp) {
    if (!timestamp) return 'No date';
    
    let date;
    if (timestamp.toDate) {
        date = timestamp.toDate();
    } else {
        date = new Date(timestamp);
    }
    
    // Format: MM/DD/YYYY, HH:MM AM/PM
    return date.toLocaleString('en-US', { 
        month: '2-digit', 
        day: '2-digit', 
        year: 'numeric',
        hour: '2-digit',
        minute: '2-digit',
        hour12: true
    }).replace(',', '');
}

// Delete individual wallet entry
async function deleteWalletEntry(entryId, memberKey) {
    if (!confirm('Delete this transfer entry?')) return;
    
    try {
        await db.collection("wallet_entries").doc(entryId).delete();
        console.log('Entry deleted');
        // Refresh the display
        loadAllWalletEntries();
    } catch (error) {
        console.error("Error deleting entry: ", error);
        alert("Failed to delete entry");
    }
}

// Load ALL wallet entries (cumulative history)
async function loadAllWalletEntries() {
    try {
        // Get all entries ordered by timestamp (newest first)
        const snapshot = await db.collection("wallet_entries")
            .orderBy("timestamp", "desc")
            .get();
        
        let totalEntries = 0;
        
        if (snapshot.empty) {
            membersContainer.innerHTML = `
                <div class="no-data-modal">
                    <span class="no-data-icon">📭</span>
                    No wallet transfers yet<br>
                    <small style="opacity:0.8">Click "Send Wallet" to create your first transfer</small>
                </div>
            `;
            totalTransfersBadge.innerText = 'Total: 0 transfers';
            return;
        }
        
        // Group entries by member
        const membersData = {
            anas: { label: 'Anas', headerClass: 'header-anas', entries: [], total: 0 },
            oussama: { label: 'Oussama', headerClass: 'header-oussama', entries: [], total: 0 },
            amine: { label: 'Amine', headerClass: 'header-amine', entries: [], total: 0 },
            houssam: { label: 'Houssam', headerClass: 'header-houssam', entries: [], total: 0 },
            zaki: { label: 'Zaki', headerClass: 'header-zaki', entries: [], total: 0 },
            mohamed: { label: 'Mohamed', headerClass: 'header-mohamed', entries: [], total: 0 }
        };
        
        // Process each entry
        snapshot.forEach(doc => {
            const data = doc.data();
            const member = data.member; // anas, oussama, etc.
            const amount = data.amount || 0;
            const timestamp = data.timestamp;
            const formattedDate = formatEntryDate(timestamp);
            
            if (membersData[member]) {
                totalEntries++;
                membersData[member].total += amount;
                membersData[member].entries.push({
                    id: doc.id,
                    amount: amount.toFixed(2),
                    date: formattedDate,
                    rawTimestamp: timestamp
                });
            }
        });
        
        // Update total badge
        totalTransfersBadge.innerText = `Total: ${totalEntries} transfers`;
        
        // Build the HTML
        let htmlStr = '';
        
        Object.keys(membersData).forEach(memberKey => {
            const member = membersData[memberKey];
            const entries = member.entries;
            
            let entriesHTML = '';
            if (entries.length === 0) {
                entriesHTML = `<div class="no-entries">No transfers yet</div>`;
            } else {
                entries.forEach(entry => {
                    entriesHTML += `
                        <div class="wallet-entry">
                            <div class="entry-main">
                                <span class="entry-amount">${entry.amount} MAD</span>
                                <button class="entry-delete" onclick="deleteWalletEntry('${entry.id}', '${memberKey}')" title="Delete this transfer">🗑️</button>
                            </div>
                            <div class="entry-date">
                                <svg viewBox="0 0 24 24">
                                    <path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10 10-4.5 10-10S17.5 2 12 2zm0 18c-4.4 0-8-3.6-8-8s3.6-8 8-8 8 3.6 8 8-3.6 8-8 8zm.5-13H11v6l5.2 3.1.8-1.2-4.5-2.7V7z"/>
                                </svg>
                                ${entry.date}
                            </div>
                        </div>
                    `;
                });
            }
            
            htmlStr += `
                <div class="member-card">
                    <div class="member-header ${member.headerClass}">
                        ${member.label}
                        <div class="member-total">Total: ${member.total.toFixed(2)} MAD</div>
                    </div>
                    <div class="entries-container">
                        ${entriesHTML}
                    </div>
                </div>
            `;
        });
        
        membersContainer.innerHTML = htmlStr;
        
    } catch (error) {
        console.error("Error loading wallet entries: ", error);
        membersContainer.innerHTML = `
            <div class="no-data-modal">
                <span class="no-data-icon">❌</span>
                Error loading wallet data<br>
                <small>${error.message}</small>
            </div>
        `;
    }
}

// ========== SEND WALLET - Add new entry for each member ==========
const sendBtn = document.getElementById('sendWalletBtn');
const viewBtn = document.getElementById('viewWalletBtn');

sendBtn.addEventListener('click', async function() {
    // Check if there are any non-zero totals
    const hasNonZero = Object.values(currentTotals).some(val => val > 0);
    if (!hasNonZero) {
        alert('No amounts to send. All totals are zero.');
        return;
    }
    
    try {
        sendBtn.innerHTML = `<span>⏳</span> Sending...`;
        sendBtn.disabled = true;
        
        // Create a batch write
        const batch = db.batch();
        
        // For each member with non-zero amount, create a separate entry
        const members = ['anas', 'oussama', 'amine', 'houssam', 'zaki', 'mohamed'];
        const now = new Date();
        let entriesAdded = 0;
        
        members.forEach(memberKey => {
            const amount = currentTotals[memberKey];
            if (amount > 0) {
                entriesAdded++;
                const entryRef = db.collection("wallet_entries").doc(); // auto ID
                batch.set(entryRef, {
                    member: memberKey,
                    amount: amount,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                    createdAt: now.toISOString()
                });
            }
        });
        
        if (entriesAdded === 0) {
            alert('No amounts to send.');
            sendBtn.innerHTML = `<svg viewBox="0 0 24 24"><path d="M4 6h16v2H4V6zm2-4h12v2H6V2zm16 7H2v12h20V9zm-4 7h-4v-2h4v2z"/><circle cx="18" cy="16" r="2" fill="white" opacity="0.3"/></svg> Send Wallet`;
            sendBtn.disabled = false;
            return;
        }
        
        // Commit the batch
        await batch.commit();
        
        // Delete ALL payment records to clear current totals (but keep wallet_entries)
        const paymentsSnapshot = await db.collection("payments").get();
        if (!paymentsSnapshot.empty) {
            const deleteBatch = db.batch();
            paymentsSnapshot.docs.forEach(doc => {
                deleteBatch.delete(doc.ref);
            });
            await deleteBatch.commit();
        }
        
        // Show success
        sendBtn.innerHTML = `<svg viewBox="0 0 24 24"><path d="M4 6h16v2H4V6zm2-4h12v2H6V2zm16 7H2v12h20V9zm-4 7h-4v-2h4v2z"/><circle cx="18" cy="16" r="2" fill="white" opacity="0.3"/></svg> Sent ✓`;
        
        // Reset button after 2 seconds
        setTimeout(() => {
            sendBtn.innerHTML = `<svg viewBox="0 0 24 24"><path d="M4 6h16v2H4V6zm2-4h12v2H6V2zm16 7H2v12h20V9zm-4 7h-4v-2h4v2z"/><circle cx="18" cy="16" r="2" fill="white" opacity="0.3"/></svg> Send Wallet`;
            sendBtn.disabled = false;
        }, 2000);
        
    } catch (error) {
        console.error("Error saving wallet entries: ", error);
        alert("Failed to save wallet. Check connection.");
        sendBtn.innerHTML = `<svg viewBox="0 0 24 24"><path d="M4 6h16v2H4V6zm2-4h12v2H6V2zm16 7H2v12h20V9zm-4 7h-4v-2h4v2z"/><circle cx="18" cy="16" r="2" fill="white" opacity="0.3"/></svg> Send Wallet`;
        sendBtn.disabled = false;
    }
});
