<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
<title>Admin Panel - Payment Records</title>

<style>

* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

body{
font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
background: #f0f2f5;
padding: 12px;
margin:0;
min-height: 100vh;
}

h1{
text-align:center;
color:#1a1a1a;
margin: 15px 0 20px;
font-size: 1.8em;
}

/* Header Actions */
.header-actions {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
    flex-wrap: wrap;
    gap: 10px;
}

/* Back Button */
.back-btn {
    background: #6c757d;
    color: white;
    border: none;
    padding: 12px 25px;
    border-radius: 25px;
    cursor: pointer;
    font-weight: 500;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    box-shadow: 0 2px 8px rgba(108,117,125,0.3);
    transition: all 0.2s;
    font-size: 0.95em;
    text-decoration: none;
}

.back-btn svg {
    width: 18px;
    height: 18px;
    fill: currentColor;
}

.back-btn:active {
    transform: scale(0.95);
    background: #5a6268;
}

.refresh-btn{
padding:12px 25px;
background:#2196f3;
color:white;
border:none;
border-radius:25px;
cursor:pointer;
font-size:0.95em;
font-weight:500;
box-shadow:0 2px 8px rgba(33,150,243,0.3);
transition: all 0.2s;
display: inline-flex;
align-items: center;
gap: 5px;
}

.refresh-btn:active{
transform:scale(0.95);
background:#1976d2;
}

.logout-btn {
    background: #dc3545;
    color: white;
    border: none;
    padding: 12px 25px;
    border-radius: 25px;
    cursor: pointer;
    font-weight: 500;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    box-shadow: 0 2px 8px rgba(220,53,69,0.3);
    transition: all 0.2s;
    font-size: 0.95em;
}

.logout-btn:active {
    transform: scale(0.95);
    background: #c82333;
}

/* Table Container */
.table-container{
overflow-x: auto;
border-radius: 16px;
box-shadow:0 4px 15px rgba(0,0,0,0.1);
margin-bottom: 25px;
background: white;
}

table{
width:100%;
border-collapse:collapse;
background:white;
font-size: 14px;
min-width: 700px;
}

th,td{
padding:14px 10px;
border:1px solid #e0e0e0;
text-align:center;
}

th{
background:#2c3e50;
color:white;
font-weight:600;
font-size: 13px;
white-space: nowrap;
}

tr:nth-child(even){
background:#f8f9fa;
}

tr:hover{
background:#e8f0fe;
}

/* Person badges */
.person-badge {
    display: inline-block;
    padding: 5px 12px;
    border-radius: 30px;
    font-weight: 600;
    font-size: 12px;
    min-width: 80px;
}

.person-anas { background: #ffcdd2; color: #c62828; }
.person-ous { background: #bbdefb; color: #1565c0; }
.person-amine { background: #fff9c4; color: #9e6b0c; }
.person-houssam { background: #ffe0b2; color: #bf5e00; }
.person-zaki { background: #c8e6c9; color: #2e7d32; }

/* Delete button for each row */
.deleteBtn {
    background: #ff5252;
    color: white;
    border: none;
    width: 36px;
    height: 36px;
    border-radius: 10px;
    cursor: pointer;
    font-size: 1.2em;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    box-shadow: 0 2px 5px rgba(255,82,82,0.3);
}

.deleteBtn:hover {
    background: #d32f2f;
    transform: scale(1.05);
}

.deleteBtn:active {
    transform: scale(0.9);
}

/* Summary Section */
.summary{
display: grid;
grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
gap: 10px;
margin: 20px 0 10px;
}

.box{
background: white;
padding: 12px 8px;
border-radius: 16px;
box-shadow:0 2px 8px rgba(0,0,0,0.08);
font-weight: 500;
font-size: 0.9em;
text-align: center;
border: 1px solid #eaeef2;
transition: transform 0.2s;
}

.box:active{
transform: scale(0.98);
}

.box span{
display: block;
font-size: 1.3em;
font-weight: 700;
margin-top: 5px;
color: #2c3e50;
}

/* Person-specific summary colors */
.box[data-person="anas"] { border-top: 4px solid #c62828; }
.box[data-person="oussama"] { border-top: 4px solid #1565c0; }
.box[data-person="amine"] { border-top: 4px solid #9e6b0c; }
.box[data-person="houssam"] { border-top: 4px solid #bf5e00; }
.box[data-person="zaki"] { border-top: 4px solid #2e7d32; }

.box small {
    color: #666;
    font-size: 0.75em;
    display: block;
    margin-top: 2px;
}

/* No data state */
.no-data{
text-align:center;
padding:50px 20px;
background:white;
border-radius:16px;
color:#666;
font-size:1.1em;
}

.no-data-icon{
font-size:3.5em;
margin-bottom:15px;
opacity:0.5;
}

/* Responsive */
@media (min-width: 768px) {
    body {
        padding: 30px;
    }
    
    h1 {
        font-size: 2.2em;
    }
    
    .summary {
        grid-template-columns: repeat(5, 1fr);
        gap: 15px;
    }
    
    .box {
        padding: 15px 10px;
        font-size: 1em;
    }
    
    .box span {
        font-size: 1.5em;
    }
    
    table {
        font-size: 15px;
        min-width: auto;
    }
}

/* تنسيق شريط التمرير */
::-webkit-scrollbar {
    width: 10px;
    height: 10px;
}

::-webkit-scrollbar-track {
    background: #f1f1f1;
    border-radius: 5px;
}

::-webkit-scrollbar-thumb {
    background: #2c3e50;
    border-radius: 5px;
}

::-webkit-scrollbar-thumb:hover {
    background: #1a252f;
}

</style>
</head>

<body>

<!-- Header Actions -->
<div class="header-actions">
    <div style="display: flex; gap: 10px; flex-wrap: wrap;">
        <!-- Back Button with left arrow SVG -->
        <button class="back-btn" onclick="window.location.href='index.html'">
            <svg viewBox="0 0 24 24">
                <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/>
            </svg>
            Back
        </button>
        
        <button class="refresh-btn" onclick="window.location.reload()">
            <span>🔄</span> Refresh Data
        </button>
    </div>
    
    <button class="logout-btn" onclick="logout()">
        <span>🚪</span> Logout
    </button>
</div>

<h1>💰 Admin Panel</h1>

<!-- Summary Section -->
<div class="summary" id="summaryContainer">
    <div class="box" data-person="anas">
        Anas <span id="anasTotal">0.00</span> <small>MAD</small>
    </div>
    <div class="box" data-person="oussama">
        Oussama <span id="oussamaTotal">0.00</span> <small>MAD</small>
    </div>
    <div class="box" data-person="amine">
        Amine <span id="amineTotal">0.00</span> <small>MAD</small>
    </div>
    <div class="box" data-person="houssam">
        Houssam <span id="houssamTotal">0.00</span> <small>MAD</small>
    </div>
    <div class="box" data-person="zaki">
        Zaki <span id="zakiTotal">0.00</span> <small>MAD</small>
    </div>
</div>

<!-- Table Container -->
<div class="table-container">
    <table>
        <thead>
            <tr>
                <th>Main</th>
                <th>Second</th>
                <th>Price MAD</th>
                <th>Description</th>
                <th>Time</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="tableBody">
            <!-- Data will be inserted here -->
        </tbody>
    </table>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>

// Check authentication first
if (sessionStorage.getItem('isAuthenticated') !== 'true') {
    window.location.href = 'login.html';
}

// Logout function
function logout() {
    sessionStorage.removeItem('isAuthenticated');
    window.location.href = 'login.html';
}

const firebaseConfig = {
apiKey: "AIzaSyCh8ssk6K7_LXDPpG3X85Z7VlUwDa_0_Og",
authDomain: "deliverymarrakech.firebaseapp.com",
projectId: "deliverymarrakech",
storageBucket: "deliverymarrakech.firebasestorage.app",
messagingSenderId: "543072772322",
appId: "1:543072772322:web:468d0c047e06c86bde7ebb",
measurementId: "G-YMXBJFJ9N8"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();
const tableBody = document.getElementById("tableBody");

// Helper function to get person class for styling
function getPersonClass(person) {
    switch(person?.toLowerCase()) {
        case "anas": return "person-anas"
        case "oussama": return "person-ous"
        case "amine": return "person-amine"
        case "houssam": return "person-houssam"
        case "zaki": return "person-zaki"
        default: return ""
    }
}

db.collection("payments")
.orderBy("time","desc")
.onSnapshot(function(snapshot){

tableBody.innerHTML=""

// Initialize totals
let totals = {
    anas: 0,
    oussama: 0,
    amine: 0,
    houssam: 0,
    zaki: 0
}

if (snapshot.empty) {
    // Show empty state
    let row = document.createElement("tr")
    row.innerHTML = `
        <td colspan="6" style="padding: 0;">
            <div class="no-data">
                <div class="no-data-icon">📭</div>
                No payment records found
            </div>
        </td>
    `
    tableBody.appendChild(row)
} else {
    snapshot.forEach(function(doc){

    let data = doc.data()
    let row = document.createElement("tr")
    
    // Calculate price and half
    let price = parseFloat(data.price) || 0
    let half = price / 2
    
    // Get person classes for badges
    let mainClass = getPersonClass(data.name1)
    let secondClass = getPersonClass(data.name2)
    
    // Add to totals based on names
    if(data.name1?.toLowerCase() === "anas") totals.anas += half
    if(data.name1?.toLowerCase() === "oussama") totals.oussama += half
    if(data.name1?.toLowerCase() === "amine") totals.amine += half
    if(data.name2?.toLowerCase() === "houssam") totals.houssam += half
    if(data.name2?.toLowerCase() === "zaki") totals.zaki += half

    row.innerHTML = `
    <td><span class="person-badge ${mainClass}">${data.name1 || 'N/A'}</span></td>
    <td><span class="person-badge ${secondClass}">${data.name2 || 'N/A'}</span></td>
    <td><strong>${price.toFixed(2)} MAD</strong></td>
    <td>${data.description || '-'}</td>
    <td>${data.time ? new Date(data.time.seconds*1000).toLocaleString() : 'N/A'}</td>
    <td><button class="deleteBtn" onclick="deleteDoc('${doc.id}')" title="Delete this record">🗑️</button></td>
    `

    tableBody.appendChild(row)
    })
}

// Update totals in UI
document.getElementById("anasTotal").innerText = totals.anas.toFixed(2)
document.getElementById("oussamaTotal").innerText = totals.oussama.toFixed(2)
document.getElementById("amineTotal").innerText = totals.amine.toFixed(2)
document.getElementById("houssamTotal").innerText = totals.houssam.toFixed(2)
document.getElementById("zakiTotal").innerText = totals.zaki.toFixed(2)

})

function deleteDoc(id){
if (confirm('Are you sure you want to delete this record? This action cannot be undone.')) {
    db.collection("payments").doc(id).delete()
        .then(() => {
            console.log("Document successfully deleted!");
        })
        .catch((error) => {
            console.error("Error removing document: ", error);
            alert("Error deleting record. Please try again.");
        });
}
}

</script>

</body>
</html>
