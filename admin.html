<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
<title>Admin Panel · Wallet forwarding (Firebase Storage)</title>

<style>
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

body{
font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
background: #f0f2f5;
padding: 12px;
margin:0;
min-height: 100vh;
}

h1{
text-align:center;
color:#1a1a1a;
margin: 15px 0 20px;
font-size: 1.8em;
}

/* Header Actions */
.header-actions {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
    flex-wrap: wrap;
    gap: 10px;
}

/* Back Button */
.back-btn {
    background: #6c757d;
    color: white;
    border: none;
    padding: 12px 25px;
    border-radius: 25px;
    cursor: pointer;
    font-weight: 500;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    box-shadow: 0 2px 8px rgba(108,117,125,0.3);
    transition: all 0.2s;
    font-size: 0.95em;
    text-decoration: none;
}

.back-btn svg {
    width: 18px;
    height: 18px;
    fill: currentColor;
}

.back-btn:active {
    transform: scale(0.95);
    background: #5a6268;
}

.refresh-btn{
padding:12px 25px;
background:#2196f3;
color:white;
border:none;
border-radius:25px;
cursor:pointer;
font-size:0.95em;
font-weight:500;
box-shadow:0 2px 8px rgba(33,150,243,0.3);
transition: all 0.2s;
display: inline-flex;
align-items: center;
gap: 5px;
}

.refresh-btn:active{
transform:scale(0.95);
background:#1976d2;
}

.logout-btn {
    background: #dc3545;
    color: white;
    border: none;
    padding: 12px 25px;
    border-radius: 25px;
    cursor: pointer;
    font-weight: 500;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    box-shadow: 0 2px 8px rgba(220,53,69,0.3);
    transition: all 0.2s;
    font-size: 0.95em;
}

.logout-btn:active {
    transform: scale(0.95);
    background: #c82333;
}

/* wallet action buttons */
.wallet-actions {
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
}
.send-wallet-btn {
    background: #9c27b0;
    color: white;
    border: none;
    padding: 12px 28px;
    border-radius: 40px;
    cursor: pointer;
    font-weight: 600;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    box-shadow: 0 4px 12px rgba(156,39,176,0.4);
    transition: all 0.2s;
    font-size: 1rem;
    letter-spacing: 0.3px;
}
.send-wallet-btn:active {
    transform: scale(0.96);
    background: #7b1fa2;
}
.send-wallet-btn svg {
    width: 20px;
    height: 20px;
    fill: white;
}

.view-wallet-btn {
    background: #2d5f7e;
    color: white;
    border: none;
    padding: 12px 28px;
    border-radius: 40px;
    cursor: pointer;
    font-weight: 600;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    box-shadow: 0 4px 12px rgba(45,95,126,0.4);
    transition: all 0.2s;
    font-size: 1rem;
}
.view-wallet-btn:active {
    transform: scale(0.96);
    background: #1d3e55;
}
.view-wallet-btn svg {
    width: 20px;
    height: 20px;
    fill: white;
}

/* Table Container */
.table-container{
overflow-x: auto;
border-radius: 16px;
box-shadow:0 4px 15px rgba(0,0,0,0.1);
margin-bottom: 25px;
background: white;
}

table{
width:100%;
border-collapse:collapse;
background:white;
font-size: 14px;
min-width: 700px;
}

th,td{
padding:14px 10px;
border:1px solid #e0e0e0;
text-align:center;
}

th{
background:#2c3e50;
color:white;
font-weight:600;
font-size: 13px;
white-space: nowrap;
}

tr:nth-child(even){
background:#f8f9fa;
}

tr:hover{
background:#e8f0fe;
}

/* Person badges */
.person-badge {
    display: inline-block;
    padding: 5px 12px;
    border-radius: 30px;
    font-weight: 600;
    font-size: 12px;
    min-width: 80px;
}

.person-anas { background: #ffcdd2; color: #c62828; }
.person-ous { background: #bbdefb; color: #1565c0; }
.person-amine { background: #fff9c4; color: #9e6b0c; }
.person-houssam { background: #ffe0b2; color: #bf5e00; }
.person-zaki { background: #c8e6c9; color: #2e7d32; }
.person-mohamed { background: #e1b0ff; color: #6a1b9a; }

/* Delete button for each row */
.deleteBtn {
    background: #ff5252;
    color: white;
    border: none;
    width: 36px;
    height: 36px;
    border-radius: 10px;
    cursor: pointer;
    font-size: 1.2em;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    box-shadow: 0 2px 5px rgba(255,82,82,0.3);
}

.deleteBtn:hover {
    background: #d32f2f;
    transform: scale(1.05);
}

.deleteBtn:active {
    transform: scale(0.9);
}

/* Summary Section (main totals) */
.summary{
display: grid;
grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
gap: 10px;
margin: 20px 0 10px;
}

.box{
background: white;
padding: 12px 8px;
border-radius: 16px;
box-shadow:0 2px 8px rgba(0,0,0,0.08);
font-weight: 500;
font-size: 0.9em;
text-align: center;
border: 1px solid #eaeef2;
transition: transform 0.2s;
}

.box:active{
transform: scale(0.98);
}

.box span{
display: block;
font-size: 1.3em;
font-weight: 700;
margin-top: 5px;
color: #2c3e50;
}

/* Person-specific summary colors */
.box[data-person="anas"] { border-top: 4px solid #c62828; }
.box[data-person="oussama"] { border-top: 4px solid #1565c0; }
.box[data-person="amine"] { border-top: 4px solid #9e6b0c; }
.box[data-person="houssam"] { border-top: 4px solid #bf5e00; }
.box[data-person="zaki"] { border-top: 4px solid #2e7d32; }
.box[data-person="mohamed"] { border-top: 4px solid #6a1b9a; }

.box small {
    color: #666;
    font-size: 0.75em;
    display: block;
    margin-top: 2px;
}

/* Wallet snapshot section (View Wallet) */
.wallet-snapshot {
    background: white;
    border-radius: 24px;
    padding: 20px 18px;
    margin: 25px 0 15px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.05);
    border: 1px solid #d0dae8;
}

.snapshot-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
    font-size: 1.3rem;
    font-weight: 600;
    color: #1e2b3a;
    border-bottom: 2px dashed #b0c4de;
    padding-bottom: 12px;
}
.snapshot-header svg {
    width: 28px;
    height: 28px;
    fill: #1e2b3a;
}

.wallet-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 20px 30px;
    justify-content: flex-start;
    align-items: center;
}
.wallet-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    min-width: 95px;
    padding: 10px 8px;
    background: #f8faff;
    border-radius: 28px;
    border: 1px solid #cddaea;
    transition: 0.1s;
}
.wallet-item .wallet-person {
    font-weight: 700;
    font-size: 1rem;
}
.wallet-item .wallet-amount {
    font-weight: 800;
    font-size: 1.4rem;
    line-height: 1.3;
    color: #1b3b4f;
}
.wallet-item .wallet-currency {
    font-size: 0.7rem;
    opacity: 0.7;
}
.wallet-timestamp {
    margin-left: auto;
    font-size: 0.85rem;
    color: #4a5b6b;
    background: #eaeff5;
    padding: 6px 16px;
    border-radius: 40px;
    white-space: nowrap;
}

/* No data state */
.no-data{
text-align:center;
padding:50px 20px;
background:white;
border-radius:16px;
color:#666;
font-size:1.1em;
}

.no-data-icon{
font-size:3.5em;
margin-bottom:15px;
opacity:0.5;
}

/* Responsive */
@media (min-width: 768px) {
    body {
        padding: 30px;
    }
    
    h1 {
        font-size: 2.2em;
    }
    
    .summary {
        grid-template-columns: repeat(6, 1fr);
        gap: 15px;
    }
    
    .box {
        padding: 15px 10px;
        font-size: 1em;
    }
    
    .box span {
        font-size: 1.5em;
    }
    
    table {
        font-size: 15px;
        min-width: auto;
    }
}

/* تنسيق شريط التمرير */
::-webkit-scrollbar {
    width: 10px;
    height: 10px;
}

::-webkit-scrollbar-track {
    background: #f1f1f1;
    border-radius: 5px;
}

::-webkit-scrollbar-thumb {
    background: #2c3e50;
    border-radius: 5px;
}

::-webkit-scrollbar-thumb:hover {
    background: #1a252f;
}

</style>
</head>

<body>

<!-- Header Actions + Wallet Buttons integrated -->
<div class="header-actions">
    <div style="display: flex; gap: 10px; flex-wrap: wrap;">
        <!-- Back Button with left arrow SVG -->
        <button class="back-btn" onclick="window.location.href='index.html'">
            <svg viewBox="0 0 24 24">
                <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/>
            </svg>
            Back
        </button>
        
        <button class="refresh-btn" onclick="window.location.reload()">
            <span>🔄</span> Refresh Data
        </button>
    </div>
    
    <!-- New wallet action group (stylish and bound) -->
    <div class="wallet-actions">
        <!-- SEND WALLET button – hides main totals after sending to Firebase -->
        <button class="send-wallet-btn" id="sendWalletBtn">
            <svg viewBox="0 0 24 24"><path d="M4 6h16v2H4V6zm2-4h12v2H6V2zm16 7H2v12h20V9zm-4 7h-4v-2h4v2z"/></svg>
            Send Wallet
        </button>
        <!-- VIEW WALLET button – shows the latest archived snapshot from Firebase -->
        <button class="view-wallet-btn" id="viewWalletBtn">
            <svg viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
            View wallet
        </button>
    </div>
    
    <button class="logout-btn" onclick="logout()">
        <span>🚪</span> Logout
    </button>
</div>

<h1>💰 Admin Panel · wallet forward (Firebase)</h1>

<!-- Summary Section (main totals) – these will be cleared visually on send -->
<div class="summary" id="summaryContainer">
    <div class="box" data-person="anas">
        Anas <span id="anasTotal">0.00</span> <small>MAD</small>
    </div>
    <div class="box" data-person="oussama">
        Oussama <span id="oussamaTotal">0.00</span> <small>MAD</small>
    </div>
    <div class="box" data-person="amine">
        Amine <span id="amineTotal">0.00</span> <small>MAD</small>
    </div>
    <div class="box" data-person="houssam">
        Houssam <span id="houssamTotal">0.00</span> <small>MAD</small>
    </div>
    <div class="box" data-person="zaki">
        Zaki <span id="zakiTotal">0.00</span> <small>MAD</small>
    </div>
    <div class="box" data-person="mohamed">
        Mohamed <span id="mohamedTotal">0.00</span> <small>MAD</small>
    </div>
</div>

<!-- View Wallet area (shows archived totals with timestamp from Firebase) -->
<div class="wallet-snapshot" id="walletSnapshotArea" style="display: none;">
    <div class="snapshot-header">
        <svg viewBox="0 0 24 24"><path d="M21 18v1c0 1.1-.9 2-2 2H5c-1.11 0-2-.9-2-2V5c0-1.1.89-2 2-2h14c1.1 0 2 .9 2 2v1h-9c-1.11 0-2 .9-2 2v8c0 1.1.89 2 2 2h9zm-9-2h10V8H12v8zm4-2.5c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5z"/></svg>
        <span>📦 Archived wallet · snapshot (from Firebase)</span>
    </div>
    <div id="walletContent" class="wallet-grid">
        <!-- dynamic content from Firebase -->
    </div>
    <div class="wallet-timestamp" id="walletTimestamp"></div>
</div>

<!-- Table Container -->
<div class="table-container">
    <table>
        <thead>
            <tr>
                <th>Main</th>
                <th>Second</th>
                <th>Price MAD</th>
                <th>Description</th>
                <th>Time</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="tableBody">
            <!-- Data will be inserted here -->
        </tbody>
    </table>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>

// Check authentication
if (sessionStorage.getItem('isAuthenticated') !== 'true') {
    window.location.href = 'login.html';
}

// Logout function
function logout() {
    sessionStorage.removeItem('isAuthenticated');
    window.location.href = 'login.html';
}

const firebaseConfig = {
apiKey: "AIzaSyCh8ssk6K7_LXDPpG3X85Z7VlUwDa_0_Og",
authDomain: "deliverymarrakech.firebaseapp.com",
projectId: "deliverymarrakech",
storageBucket: "deliverymarrakech.firebasestorage.app",
messagingSenderId: "543072772322",
appId: "1:543072772322:web:468d0c047e06c86bde7ebb",
measurementId: "G-YMXBJFJ9N8"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();
const tableBody = document.getElementById("tableBody");

// Helper function to get person class for styling
function getPersonClass(person) {
    switch(person?.toLowerCase()) {
        case "anas": return "person-anas"
        case "oussama": return "person-ous"
        case "amine": return "person-amine"
        case "houssam": return "person-houssam"
        case "zaki": return "person-zaki"
        case "mohamed": return "person-mohamed"
        default: return ""
    }
}

// totals variable to keep last computed (for send)
let lastTotals = {
    anas: 0, oussama: 0, amine: 0, houssam: 0, zaki: 0, mohamed: 0
};

// Listen to payments and update table + main summary
db.collection("payments")
.orderBy("time","desc")
.onSnapshot(function(snapshot){

tableBody.innerHTML = "";

// Initialize totals
let totals = {
    anas: 0,
    oussama: 0,
    amine: 0,
    houssam: 0,
    zaki: 0,
    mohamed: 0
};

if (snapshot.empty) {
    let row = document.createElement("tr");
    row.innerHTML = `
        <td colspan="6" style="padding: 0;">
            <div class="no-data">
                <div class="no-data-icon">📭</div>
                No payment records found
            </div>
        </td>
    `;
    tableBody.appendChild(row);
} else {
    snapshot.forEach(function(doc){
        let data = doc.data();
        let row = document.createElement("tr");
        
        let price = parseFloat(data.price) || 0;
        let half = price / 2;
        
        let mainClass = getPersonClass(data.name1);
        let secondClass = getPersonClass(data.name2);
        
        // Totals logic (same as original)
        if(data.name1?.toLowerCase() === "anas") totals.anas += half;
        if(data.name1?.toLowerCase() === "oussama") totals.oussama += half;
        if(data.name1?.toLowerCase() === "amine") totals.amine += half;
        if(data.name2?.toLowerCase() === "houssam") totals.houssam += half;
        if(data.name2?.toLowerCase() === "zaki") totals.zaki += half;
        if(data.name1?.toLowerCase() === "mohamed") totals.mohamed += half;
        if(data.name2?.toLowerCase() === "mohamed") totals.mohamed += half;

        row.innerHTML = `
        <td><span class="person-badge ${mainClass}">${data.name1 || 'N/A'}</span></td>
        <td><span class="person-badge ${secondClass}">${data.name2 || 'N/A'}</span></td>
        <td><strong>${price.toFixed(2)} MAD</strong></td>
        <td>${data.description || '-'}</td>
        <td>${data.time ? new Date(data.time.seconds*1000).toLocaleString() : 'N/A'}</td>
        <td><button class="deleteBtn" onclick="deleteDoc('${doc.id}')" title="Delete this record">🗑️</button></td>
        `;

        tableBody.appendChild(row);
    });
}

// keep a copy for send wallet
lastTotals = {...totals};

// Update main summary
document.getElementById("anasTotal").innerText = totals.anas.toFixed(2);
document.getElementById("oussamaTotal").innerText = totals.oussama.toFixed(2);
document.getElementById("amineTotal").innerText = totals.amine.toFixed(2);
document.getElementById("houssamTotal").innerText = totals.houssam.toFixed(2);
document.getElementById("zakiTotal").innerText = totals.zaki.toFixed(2);
document.getElementById("mohamedTotal").innerText = totals.mohamed.toFixed(2);

}); // end snapshot

function deleteDoc(id){
    if (confirm('Are you sure you want to delete this record? This action cannot be undone.')) {
        db.collection("payments").doc(id).delete()
            .then(() => console.log("deleted"))
            .catch(err => { alert("Error: "+ err); });
    }
}

// ---------- WALLET LOGIC WITH FIREBASE (ACTUAL MEMORY) ----------
const sendBtn = document.getElementById('sendWalletBtn');
const viewBtn = document.getElementById('viewWalletBtn');
const walletArea = document.getElementById('walletSnapshotArea');
const walletContent = document.getElementById('walletContent');
const walletTimestamp = document.getElementById('walletTimestamp');

// Function to render wallet snapshot in UI
function renderWalletSnapshot(archive) {
    // archive = { totals: {anas, oussama, amine, houssam, zaki, mohamed}, timestamp: '...', formattedDate: '...' }
    const t = archive.totals || {};
    const personMap = [
        { label: 'Anas', key: 'anas', class:'person-anas' },
        { label: 'Oussama', key: 'oussama', class:'person-ous' },
        { label: 'Amine', key: 'amine', class:'person-amine' },
        { label: 'Houssam', key: 'houssam', class:'person-houssam' },
        { label: 'Zaki', key: 'zaki', class:'person-zaki' },
        { label: 'Mohamed', key: 'mohamed', class:'person-mohamed' }
    ];
    let htmlStr = '';
    personMap.forEach(p => {
        let amount = (t[p.key] || 0).toFixed(2);
        htmlStr += `
            <div class="wallet-item" style="border-left: 5px solid var(--${p.key}-color, #aaa); background: #f3f6fd;">
                <span class="wallet-person person-badge ${p.class}">${p.label}</span>
                <span class="wallet-amount">${amount}</span>
                <span class="wallet-currency">MAD</span>
            </div>
        `;
    });
    walletContent.innerHTML = htmlStr;
    walletTimestamp.innerText = `📅 ${archive.formattedDate || archive.timestamp || 'Unknown date'}`;
    walletArea.style.display = 'block';
}

// Load the latest wallet snapshot from Firebase when page loads
async function loadLatestWalletSnapshot() {
    try {
        const snapshot = await db.collection("wallet_snapshots")
            .orderBy("timestamp", "desc")
            .limit(1)
            .get();
        
        if (!snapshot.empty) {
            const data = snapshot.docs[0].data();
            // Convert Firestore timestamp to readable date
            let formattedDate = 'Unknown date';
            if (data.timestamp) {
                const date = data.timestamp.toDate ? data.timestamp.toDate() : new Date(data.timestamp);
                formattedDate = date.toLocaleString();
            }
            
            const archive = {
                totals: data.totals || {},
                timestamp: data.timestamp,
                formattedDate: formattedDate
            };
            
            renderWalletSnapshot(archive);
        }
    } catch (error) {
        console.error("Error loading wallet snapshot: ", error);
    }
}

// Call on page load
loadLatestWalletSnapshot();

// Send wallet: save to Firebase, then clear main totals
sendBtn.addEventListener('click', async function() {
    // get lastTotals (already updated by snapshot)
    const totalsCopy = {...lastTotals};
    
    // create archive object with timestamp
    const now = new Date();
    
    // Prepare data for Firebase
    const walletData = {
        totals: totalsCopy,
        timestamp: firebase.firestore.FieldValue.serverTimestamp(), // Server timestamp
        createdAt: now.toISOString(), // Backup string date
        formattedDate: now.toLocaleString()
    };
    
    try {
        // Show loading state on button
        sendBtn.innerHTML = `<span>⏳</span> Sending...`;
        sendBtn.disabled = true;
        
        // Save to Firebase 'wallet_snapshots' collection
        await db.collection("wallet_snapshots").add(walletData);
        
        // Load the latest snapshot (which will be the one we just added)
        await loadLatestWalletSnapshot();
        
        // clear main summary boxes (hide totals - set to 0.00 visually)
        document.getElementById("anasTotal").innerText = '0.00';
        document.getElementById("oussamaTotal").innerText = '0.00';
        document.getElementById("amineTotal").innerText = '0.00';
        document.getElementById("houssamTotal").innerText = '0.00';
        document.getElementById("zakiTotal").innerText = '0.00';
        document.getElementById("mohamedTotal").innerText = '0.00';
        
        // Show success feedback
        sendBtn.innerHTML = `<svg viewBox="0 0 24 24"><path d="M4 6h16v2H4V6zm2-4h12v2H6V2zm16 7H2v12h20V9zm-4 7h-4v-2h4v2z"/></svg> Send Wallet ✓`;
        setTimeout(() => {
            sendBtn.innerHTML = `<svg viewBox="0 0 24 24"><path d="M4 6h16v2H4V6zm2-4h12v2H6V2zm16 7H2v12h20V9zm-4 7h-4v-2h4v2z"/></svg> Send Wallet`;
            sendBtn.disabled = false;
        }, 1500);
        
    } catch (error) {
        console.error("Error saving wallet snapshot: ", error);
        alert("Failed to save wallet snapshot. Check console.");
        sendBtn.innerHTML = `<svg viewBox="0 0 24 24"><path d="M4 6h16v2H4V6zm2-4h12v2H6V2zm16 7H2v12h20V9zm-4 7h-4v-2h4v2z"/></svg> Send Wallet`;
        sendBtn.disabled = false;
    }
});

// View wallet: load the latest snapshot from Firebase
viewBtn.addEventListener('click', async function() {
    try {
        viewBtn.innerHTML = `<span>⏳</span> Loading...`;
        viewBtn.disabled = true;
        
        await loadLatestWalletSnapshot();
        
        // scroll to it smoothly
        walletArea.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        
        setTimeout(() => {
            viewBtn.innerHTML = `<svg viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg> View wallet`;
            viewBtn.disabled = false;
        }, 800);
    } catch (error) {
        console.error("Error loading snapshot: ", error);
        alert("Could not load wallet snapshot.");
        viewBtn.innerHTML = `<svg viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg> View wallet`;
        viewBtn.disabled = false;
    }
});

</script>
