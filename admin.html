<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
<title>Admin Panel · Professional Wallet System</title>

<style>
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

body{
font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
background: #f0f2f5;
padding: 12px;
margin:0;
min-height: 100vh;
}

h1{
text-align:center;
color:#1a1a1a;
margin: 15px 0 20px;
font-size: 1.8em;
}

/* ========== HEADER ACTIONS ========== */
.header-actions {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-bottom: 25px;
    gap: 15px;
    background: white;
    padding: 20px 25px;
    border-radius: 60px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    border: 1px solid #e9ecf0;
}

.top-row {
    display: flex;
    gap: 20px;
    justify-content: center;
    align-items: center;
    width: 100%;
}

.bottom-row {
    display: flex;
    gap: 15px;
    justify-content: center;
    align-items: center;
    flex-wrap: wrap;
    width: 100%;
    padding-top: 10px;
    border-top: 2px dashed #e0e7f0;
}

.action-btn {
    padding: 12px 24px;
    border: none;
    border-radius: 40px;
    cursor: pointer;
    font-weight: 600;
    font-size: 0.95rem;
    display: inline-flex;
    align-items: center;
    gap: 10px;
    transition: all 0.3s ease;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    letter-spacing: 0.3px;
    position: relative;
    overflow: hidden;
}

.action-btn::before {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    width: 0;
    height: 0;
    border-radius: 50%;
    background: rgba(255,255,255,0.2);
    transform: translate(-50%, -50%);
    transition: width 0.5s, height 0.5s;
}

.action-btn:hover::before {
    width: 300px;
    height: 300px;
}

.action-btn:active {
    transform: translateY(2px);
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}

.action-btn svg {
    width: 18px;
    height: 18px;
    fill: currentColor;
}

.back-btn {
    background: linear-gradient(135deg, #6c757d, #5a6268);
    color: white;
    min-width: 120px;
}

.refresh-btn {
    background: linear-gradient(135deg, #2196f3, #1976d2);
    color: white;
}

.send-wallet-btn {
    background: linear-gradient(135deg, #9c27b0, #7b1fa2);
    color: white;
    padding: 14px 32px;
    font-size: 1.1rem;
    box-shadow: 0 8px 20px rgba(156,39,176,0.4);
}

.view-wallet-btn {
    background: linear-gradient(135deg, #2d5f7e, #1d4e6b);
    color: white;
    padding: 14px 32px;
    font-size: 1.1rem;
    box-shadow: 0 8px 20px rgba(45,95,126,0.4);
}

.logout-btn {
    background: linear-gradient(135deg, #dc3545, #c82333);
    color: white;
    min-width: 120px;
}

.send-wallet-btn svg, .view-wallet-btn svg {
    width: 22px;
    height: 22px;
}

/* ========== WALLET SNAPSHOT SECTION (Professional Horizontal Display) ========== */
.wallet-snapshot-section {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    border-radius: 30px;
    padding: 30px 25px;
    margin: 30px 0 25px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.15);
    color: white;
}

.snapshot-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 25px;
    flex-wrap: wrap;
    gap: 15px;
}

.snapshot-title {
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 1.6rem;
    font-weight: 700;
}

.snapshot-title svg {
    width: 32px;
    height: 32px;
    fill: white;
}

.snapshot-badge {
    background: rgba(255,255,255,0.2);
    padding: 8px 20px;
    border-radius: 40px;
    font-size: 1rem;
    backdrop-filter: blur(5px);
    border: 1px solid rgba(255,255,255,0.3);
}

/* Horizontal wallet cards container */
.wallet-horizontal-container {
    display: flex;
    flex-wrap: wrap;
    gap: 20px;
    justify-content: center;
    margin: 25px 0 15px;
}

/* Professional wallet card */
.pro-wallet-card {
    background: white;
    border-radius: 24px;
    padding: 20px 25px;
    min-width: 160px;
    flex: 1 1 auto;
    max-width: 200px;
    box-shadow: 0 15px 35px rgba(0,0,0,0.2);
    transform: translateY(0);
    transition: all 0.3s ease;
    border: 1px solid rgba(255,255,255,0.3);
    position: relative;
    overflow: hidden;
}

.pro-wallet-card:hover {
    transform: translateY(-5px);
    box-shadow: 0 25px 45px rgba(0,0,0,0.25);
}

.pro-wallet-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 6px;
    background: linear-gradient(90deg, #ffd700, #ff8c00);
}

.pro-wallet-card .card-person {
    font-size: 1.3rem;
    font-weight: 700;
    margin-bottom: 12px;
    padding: 6px 15px;
    display: inline-block;
    border-radius: 30px;
    color: white;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

.pro-wallet-card .card-amount {
    font-size: 2.2rem;
    font-weight: 800;
    line-height: 1.2;
    margin: 10px 0 5px;
    color: #2d3748;
}

.pro-wallet-card .card-currency {
    font-size: 0.9rem;
    color: #718096;
    font-weight: 500;
    letter-spacing: 0.5px;
}

/* Person card backgrounds */
.card-person.anas-bg { background: linear-gradient(135deg, #c62828, #b71c1c); }
.card-person.oussama-bg { background: linear-gradient(135deg, #1565c0, #0d47a1); }
.card-person.amine-bg { background: linear-gradient(135deg, #9e6b0c, #7f5a0a); }
.card-person.houssam-bg { background: linear-gradient(135deg, #bf5e00, #9e4d00); }
.card-person.zaki-bg { background: linear-gradient(135deg, #2e7d32, #1b5e20); }
.card-person.mohamed-bg { background: linear-gradient(135deg, #6a1b9a, #4a0072); }

.snapshot-footer {
    display: flex;
    justify-content: flex-end;
    margin-top: 20px;
    font-size: 1rem;
    color: rgba(255,255,255,0.9);
    background: rgba(0,0,0,0.2);
    padding: 12px 25px;
    border-radius: 50px;
    backdrop-filter: blur(5px);
}

/* ========== Table Container ========== */
.table-container{
overflow-x: auto;
border-radius: 24px;
box-shadow:0 4px 20px rgba(0,0,0,0.08);
margin-bottom: 25px;
background: white;
border: 1px solid #e9ecf0;
}

table{
width:100%;
border-collapse:collapse;
background:white;
font-size: 14px;
min-width: 700px;
}

th,td{
padding:16px 12px;
border:1px solid #edf2f7;
text-align:center;
}

th{
background:linear-gradient(135deg, #2c3e50, #1e2b3a);
color:white;
font-weight:600;
font-size: 13px;
white-space: nowrap;
letter-spacing: 0.5px;
}

tr:nth-child(even){
background:#f8fafd;
}

tr:hover{
background:#e3f2fd;
}

.person-badge {
    display: inline-block;
    padding: 6px 16px;
    border-radius: 30px;
    font-weight: 600;
    font-size: 12px;
    min-width: 90px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.05);
}

.person-anas { background: #ffebee; color: #c62828; border-left: 4px solid #c62828; }
.person-ous { background: #e3f2fd; color: #1565c0; border-left: 4px solid #1565c0; }
.person-amine { background: #fffde7; color: #9e6b0c; border-left: 4px solid #9e6b0c; }
.person-houssam { background: #fff3e0; color: #bf5e00; border-left: 4px solid #bf5e00; }
.person-zaki { background: #e8f5e9; color: #2e7d32; border-left: 4px solid #2e7d32; }
.person-mohamed { background: #f3e5f5; color: #6a1b9a; border-left: 4px solid #6a1b9a; }

.deleteBtn {
    background: #ff5252;
    color: white;
    border: none;
    width: 38px;
    height: 38px;
    border-radius: 12px;
    cursor: pointer;
    font-size: 1.2em;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    box-shadow: 0 4px 10px rgba(255,82,82,0.3);
}

.deleteBtn:hover {
    background: #d32f2f;
    transform: scale(1.1) rotate(5deg);
}

.deleteBtn:active {
    transform: scale(0.9);
}

/* Summary Section */
.summary{
display: grid;
grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
gap: 15px;
margin: 25px 0 20px;
}

.box{
background: white;
padding: 15px 10px;
border-radius: 20px;
box-shadow:0 4px 15px rgba(0,0,0,0.05);
font-weight: 500;
font-size: 0.95em;
text-align: center;
border: 1px solid #eef2f6;
transition: all 0.3s;
}

.box:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 25px rgba(0,0,0,0.1);
}

.box span{
display: block;
font-size: 1.5em;
font-weight: 700;
margin-top: 8px;
color: #1e2b3a;
}

.box[data-person="anas"] { border-bottom: 4px solid #c62828; background: linear-gradient(to bottom, #ffffff, #ffebee); }
.box[data-person="oussama"] { border-bottom: 4px solid #1565c0; background: linear-gradient(to bottom, #ffffff, #e3f2fd); }
.box[data-person="amine"] { border-bottom: 4px solid #9e6b0c; background: linear-gradient(to bottom, #ffffff, #fffde7); }
.box[data-person="houssam"] { border-bottom: 4px solid #bf5e00; background: linear-gradient(to bottom, #ffffff, #fff3e0); }
.box[data-person="zaki"] { border-bottom: 4px solid #2e7d32; background: linear-gradient(to bottom, #ffffff, #e8f5e9); }
.box[data-person="mohamed"] { border-bottom: 4px solid #6a1b9a; background: linear-gradient(to bottom, #ffffff, #f3e5f5); }

.box small {
    color: #666;
    font-size: 0.75em;
    display: block;
    margin-top: 5px;
}

/* No data state */
.no-data{
text-align:center;
padding:60px 20px;
background:white;
border-radius:24px;
color:#666;
font-size:1.2em;
border: 1px solid #e9ecf0;
}

.no-data-icon{
font-size:4em;
margin-bottom:20px;
opacity:0.5;
}

/* Responsive */
@media (max-width: 768px) {
    .header-actions {
        border-radius: 30px;
        padding: 15px;
    }
    
    .top-row {
        gap: 10px;
    }
    
    .bottom-row {
        gap: 10px;
    }
    
    .send-wallet-btn, .view-wallet-btn {
        padding: 12px 20px;
        font-size: 1rem;
    }
    
    .summary {
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
    }
    
    .wallet-horizontal-container {
        gap: 12px;
    }
    
    .pro-wallet-card {
        min-width: 130px;
        padding: 15px 15px;
    }
    
    .pro-wallet-card .card-amount {
        font-size: 1.6rem;
    }
}

/* Scrollbar styling */
::-webkit-scrollbar {
    width: 12px;
    height: 12px;
}

::-webkit-scrollbar-track {
    background: #f1f1f1;
    border-radius: 10px;
}

::-webkit-scrollbar-thumb {
    background: linear-gradient(135deg, #2c3e50, #1a252f);
    border-radius: 10px;
}

::-webkit-scrollbar-thumb:hover {
    background: linear-gradient(135deg, #1a252f, #0f1a22);
}

</style>
</head>
<body>

<!-- Header Actions -->
<div class="header-actions">
    <div class="top-row">
        <button class="action-btn back-btn" onclick="window.location.href='index.html'">
            <svg viewBox="0 0 24 24">
                <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/>

        <button class="action-btn logout-btn" onclick="logout()">

    <div class="bottom-row">
        <button class="action-btn refresh-btn" onclick="window.location.reload()">

        <button class="action-btn send-wallet-btn" id="sendWalletBtn">
            <svg viewBox="0 0 24 24">

                <circle cx="12" cy="12" r="2.5" fill="white" opacity="0.5"/>
            </svg>
            <span>View Wallet</span>
        </button>

</div>

<h1>💰 Admin Panel · Professional Wallet System</h1>

<!-- Professional Wallet Display Section -->
<div class="wallet-snapshot-section" id="walletSnapshotSection" style="display: none;">
    <div class="snapshot-header">
        <div class="snapshot-title">
            <svg viewBox="0 0 24 24">
                <path d="M21 18v1c0 1.1-.9 2-2 2H5c-1.11 0-2-.9-2-2V5c0-1.1.89-2 2-2h14c1.1 0 2 .9 2 2v1h-9c-1.11 0-2 .9-2 2v8c0 1.1.89 2 2 2h9zm-9-2h10V8H12v8zm4-2.5c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5z"/>
            </svg>
            <span>Wallet Balance Snapshots</span>
        </div>
        <div class="snapshot-badge" id="snapshotCount">Latest Snapshot</div>
    </div>
    
    <!-- Horizontal cards container -->
    <div class="wallet-horizontal-container" id="walletHorizontalContainer">
        <!-- Cards will be inserted here dynamically -->
    </div>
    
    <div class="snapshot-footer" id="snapshotTimestamp">
        <!-- Timestamp will be inserted here -->
    </div>
</div>

<!-- Summary Section -->
<div class="summary" id="summaryContainer">
    <div class="box" data-person="anas">
        Anas <span id="anasTotal">0.00</span> <small>MAD</small>
    </div>
    <div class="box" data-person="oussama">
        Oussama <span id="oussamaTotal">0.00</span> <small>MAD</small>
    </div>
    <div class="box" data-person="amine">
        Amine <span id="amineTotal">0.00</span> <small>MAD</small>
    </div>
    <div class="box" data-person="houssam">
        Houssam <span id="houssamTotal">0.00</span> <small>MAD</small>
    </div>
    <div class="box" data-person="zaki">
        Zaki <span id="zakiTotal">0.00</span> <small>MAD</small>
    </div>
    <div class="box" data-person="mohamed">
        Mohamed <span id="mohamedTotal">0.00</span> <small>MAD</small>
    </div>
</div>

<!-- Table Container -->
<div class="table-container">
    <table>
        <thead>
            <tr>
                <th>Main</th>
                <th>Second</th>
                <th>Price (MAD)</th>
                <th>Description</th>
                <th>Time</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
// Check authentication
if (sessionStorage.getItem('isAuthenticated') !== 'true') {
    window.location.href = 'login.html';
}

function logout() {
    sessionStorage.removeItem('isAuthenticated');
    window.location.href = 'login.html';
}

const firebaseConfig = {
    apiKey: "AIzaSyCh8ssk6K7_LXDPpG3X85Z7VlUwDa_0_Og",
    authDomain: "deliverymarrakech.firebaseapp.com",
    projectId: "deliverymarrakech",
    storageBucket: "deliverymarrakech.firebasestorage.app",
    messagingSenderId: "543072772322",
    appId: "1:543072772322:web:468d0c047e06c86bde7ebb",
    measurementId: "G-YMXBJFJ9N8"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const tableBody = document.getElementById("tableBody");

function getPersonClass(person) {
    switch(person?.toLowerCase()) {
        case "anas": return "person-anas"
        case "oussama": return "person-ous"
        case "amine": return "person-amine"
        case "houssam": return "person-houssam"
        case "zaki": return "person-zaki"
        case "mohamed": return "person-mohamed"
        default: return ""
    }
}

// Current totals (updated in real-time)
let currentTotals = { anas: 0, oussama: 0, amine: 0, houssam: 0, zaki: 0, mohamed: 0 };

// Listen to payments and update table + main totals
db.collection("payments")
.orderBy("time", "desc")
.onSnapshot(function(snapshot){
    tableBody.innerHTML = "";
    let totals = { anas: 0, oussama: 0, amine: 0, houssam: 0, zaki: 0, mohamed: 0 };

    if (snapshot.empty) {
        let row = document.createElement("tr");
        row.innerHTML = `<td colspan="6"><div class="no-data"><div class="no-data-icon">📭</div>No payment records found</div></td>`;
        tableBody.appendChild(row);
    } else {
        snapshot.forEach(function(doc){
            let data = doc.data();
            let row = document.createElement("tr");
            let price = parseFloat(data.price) || 0;
            let half = price / 2;
            let mainClass = getPersonClass(data.name1);
            let secondClass = getPersonClass(data.name2);
            
            // Calculate totals based on names
            if(data.name1?.toLowerCase() === "anas") totals.anas += half;
            if(data.name1?.toLowerCase() === "oussama") totals.oussama += half;
            if(data.name1?.toLowerCase() === "amine") totals.amine += half;
            if(data.name2?.toLowerCase() === "houssam") totals.houssam += half;
            if(data.name2?.toLowerCase() === "zaki") totals.zaki += half;
            if(data.name1?.toLowerCase() === "mohamed") totals.mohamed += half;
            if(data.name2?.toLowerCase() === "mohamed") totals.mohamed += half;

            row.innerHTML = `
            <td><span class="person-badge ${mainClass}">${data.name1 || 'N/A'}</span></td>
            <td><span class="person-badge ${secondClass}">${data.name2 || 'N/A'}</span></td>
            <td><strong>${price.toFixed(2)}</strong></td>
            <td>${data.description || '-'}</td>
            <td>${data.time ? new Date(data.time.seconds * 1000).toLocaleString() : 'N/A'}</td>
            <td><button class="deleteBtn" onclick="deleteDoc('${doc.id}')">🗑️</button></td>
            `;
            tableBody.appendChild(row);
        });
    }

    // Update current totals
    currentTotals = { ...totals };
    
    // Update main summary
    document.getElementById("anasTotal").innerText = totals.anas.toFixed(2);
    document.getElementById("oussamaTotal").innerText = totals.oussama.toFixed(2);
    document.getElementById("amineTotal").innerText = totals.amine.toFixed(2);
    document.getElementById("houssamTotal").innerText = totals.houssam.toFixed(2);
    document.getElementById("zakiTotal").innerText = totals.zaki.toFixed(2);
    document.getElementById("mohamedTotal").innerText = totals.mohamed.toFixed(2);
});

function deleteDoc(id) {
    if (confirm('Are you sure you want to delete this record? This action cannot be undone.')) {
        db.collection("payments").doc(id).delete()
            .then(() => console.log("Document deleted"))
            .catch(err => alert("Error: " + err));
    }
}

// ========== PROFESSIONAL WALLET DISPLAY ==========
const walletSection = document.getElementById('walletSnapshotSection');
const walletContainer = document.getElementById('walletHorizontalContainer');
const snapshotTimestamp = document.getElementById('snapshotTimestamp');
const snapshotCount = document.getElementById('snapshotCount');

// Function to display wallet snapshot professionally
function displayWalletSnapshot(archive) {
    const t = archive.totals || {};
    
    const personMap = [
        { label: 'Anas', key: 'anas', bgClass: 'anas-bg' },
        { label: 'Oussama', key: 'oussama', bgClass: 'oussama-bg' },
        { label: 'Amine', key: 'amine', bgClass: 'amine-bg' },
        { label: 'Houssam', key: 'houssam', bgClass: 'houssam-bg' },
        { label: 'Zaki', key: 'zaki', bgClass: 'zaki-bg' },
        { label: 'Mohamed', key: 'mohamed', bgClass: 'mohamed-bg' }
    ];
    
    let htmlStr = '';
    let hasData = false;
    
    personMap.forEach(p => {
        let amount = (t[p.key] || 0).toFixed(2);
        if (parseFloat(amount) > 0) hasData = true;
        
        htmlStr += `
            <div class="pro-wallet-card">
                <div class="card-person ${p.bgClass}">${p.label}</div>
                <div class="card-amount">${amount}</div>
                <div class="card-currency">Moroccan Dirham</div>
            </div>
        `;
    });
    
    if (!hasData || Object.keys(t).length === 0) {
        htmlStr = `
            <div style="text-align: center; padding: 40px; color: white; width: 100%;">
                <span style="font-size: 3rem;">📭</span>
                <p style="font-size: 1.2rem; margin-top: 15px;">No wallet data available</p>
            </div>
        `;
    }
    
    walletContainer.innerHTML = htmlStr;
    snapshotTimestamp.innerHTML = `📅 ${archive.formattedDate || 'Unknown date'}`;
    snapshotCount.innerHTML = `📊 Snapshot • ${new Date().toLocaleDateString()}`;
    walletSection.style.display = 'block';
    
    // Scroll to wallet section smoothly
    walletSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// ========== FIREBASE WALLET FUNCTIONS ==========
const sendBtn = document.getElementById('sendWalletBtn');
const viewBtn = document.getElementById('viewWalletBtn');

async function loadLatestWalletSnapshot() {
    try {
        const snapshot = await db.collection("wallet_snapshots")
            .orderBy("timestamp", "desc")
            .limit(1)
            .get();
        
        if (!snapshot.empty) {
            const data = snapshot.docs[0].data();
            let formattedDate = 'Unknown date';
            if (data.timestamp) {
                const date = data.timestamp.toDate ? data.timestamp.toDate() : new Date(data.timestamp);
                formattedDate = date.toLocaleString('en-US', { 
                    year: 'numeric', 
                    month: 'long', 
                    day: 'numeric',
                    hour: '2-digit',
                    minute: '2-digit',
                    second: '2-digit'
                });
            }
            
            return {
                totals: data.totals || {},
                timestamp: data.timestamp,
                formattedDate: formattedDate
            };
        }
        return null;
    } catch (error) {
        console.error("Error loading wallet snapshot: ", error);
        return null;
    }
}

// Send wallet - Save current totals to Firebase AND CLEAR THEM
sendBtn.addEventListener('click', async function() {
    // Save current totals to Firebase
    const totalsToSave = { ...currentTotals };
    const now = new Date();
    
    const walletData = {
        totals: totalsToSave,
        timestamp: firebase.firestore.FieldValue.serverTimestamp(),
        createdAt: now.toISOString(),
        formattedDate: now.toLocaleString('en-US', { 
            year: 'numeric', 
            month: 'long', 
            day: 'numeric',
            hour: '2-digit',
            minute: '2-digit',
            second: '2-digit'
        })
    };
    
    try {
        sendBtn.innerHTML = `<span>⏳</span> Sending...`;
        sendBtn.disabled = true;
        
        // Save to Firebase
        await db.collection("wallet_snapshots").add(walletData);
        
        // Load and display the saved snapshot
        const archive = await loadLatestWalletSnapshot();
        if (archive) {
            displayWalletSnapshot(archive);
        }
        
        // Show success message
        sendBtn.innerHTML = `<svg viewBox="0 0 24 24"><path d="M4 6h16v2H4V6zm2-4h12v2H6V2zm16 7H2v12h20V9zm-4 7h-4v-2h4v2z"/><circle cx="18" cy="16" r="2" fill="white" opacity="0.3"/></svg> Sent ✓`;
        
        // Reset button after 1.5 seconds
        setTimeout(() => {
            sendBtn.innerHTML = `<svg viewBox="0 0 24 24"><path d="M4 6h16v2H4V6zm2-4h12v2H6V2zm16 7H2v12h20V9zm-4 7h-4v-2h4v2z"/><circle cx="18" cy="16" r="2" fill="white" opacity="0.3"/></svg> Send Wallet`;
            sendBtn.disabled = false;
        }, 1500);
        
    } catch (error) {
        console.error("Error saving wallet snapshot: ", error);
        alert("Failed to save wallet. Check connection.");
        sendBtn.innerHTML = `<svg viewBox="0 0 24 24"><path d="M4 6h16v2H4V6zm2-4h12v2H6V2zm16 7H2v12h20V9zm-4 7h-4v-2h4v2z"/><circle cx="18" cy="16" r="2" fill="white" opacity="0.3"/></svg> Send Wallet`;
        sendBtn.disabled = false;
    }
});

// View wallet - Load and display the latest snapshot
viewBtn.addEventListener('click', async function() {
    try {
        viewBtn.innerHTML = `<span>⏳</span> Loading...`;
        viewBtn.disabled = true;
        
        const archive = await loadLatestWalletSnapshot();
        
        if (archive) {
            displayWalletSnapshot(archive);
        } else {
            // Show empty state
            walletContainer.innerHTML = `
                <div style="text-align: center; padding: 40px; color: white; width: 100%;">
                    <span style="font-size: 3rem;">📭</span>
                    <p style="font-size: 1.2rem; margin-top: 15px;">No saved snapshots yet</p>
                </div>
            `;
            snapshotTimestamp.innerHTML = '📅 No data available';
            snapshotCount.innerHTML = '📊 No snapshots';
            walletSection.style.display = 'block';
        }
        
        setTimeout(() => {
            viewBtn.innerHTML = `<svg viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5z"/><circle cx="12" cy="12" r="2.5" fill="white" opacity="0.5"/></svg> View Wallet`;
            viewBtn.disabled = false;
        }, 800);
    } catch (error) {
        console.error("Error loading snapshot: ", error);
        alert("Could not load wallet.");
        viewBtn.innerHTML = `<svg viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5z"/><circle cx="12" cy="12" r="2.5" fill="white" opacity="0.5"/></svg> View Wallet`;
        viewBtn.disabled = false;
    }
});

// Load latest snapshot on page load (optional)
window.addEventListener('load', async function() {
    const archive = await loadLatestWalletSnapshot();
    if (archive) {
        displayWalletSnapshot(archive);
    }
});
</script>
