<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Private System</title>
<style>
body { margin:0; font-family:Arial; }
#loginPage {
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    background:#f2f2f2;
}
input {
    padding:10px;
    font-size:16px;
    margin:5px;
    width:200px;
    border:1px solid #ddd;
    border-radius:4px;
}
button {
    padding:10px 20px;
    font-size:16px;
    border:none;
    cursor:pointer;
    border-radius:6px;
    margin:5px;
}
#mainPage, #choosePage, #paymentPage {
    display:none;
    height:100vh;
    background:white;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}
.main-btn {
    width:200px;
    margin:10px;
    color:white;
    font-weight:bold;
    border-radius:8px;
}
.red { background:red; }
.blue { background:#2196f3; }
.orange { background:orange; }
.green { background:green; }
.yellow { background:gold; color:black; }
.fixed-admin-btn {
    position: fixed;
    top: 20px;
    right: 20px;
    z-index: 1000;
    background: #2c3e50;
    color: white;
    border: none;
    padding: 10px 20px;
    border-radius: 5px;
    cursor: pointer;
}
</style>
</head>
<body>

<button class="fixed-admin-btn" onclick="window.location.href='login.html'">ADMIN</button>

<div id="loginPage">
<h2>User Login</h2>
<input id="username" placeholder="User name">
<input type="password" id="password" placeholder="Password">
<button onclick="checkLogin()">Login</button>
<div style="margin-top:10px;">Use: any username / 12341234</div>
</div>

<div id="mainPage">
<button class="main-btn red" onclick="openPerson('Anas')">Anas</button>
<button class="main-btn blue" onclick="openPerson('Oussama')">Oussama</button>
<button class="main-btn yellow" onclick="openPerson('Amine')">Amine</button>
</div>

<div id="choosePage">
<h2>Select Partner</h2>
<button class="main-btn orange" onclick="selectPerson('Houssam')">Houssam</button>
<button class="main-btn green" onclick="selectPerson('Zaki')">Zaki</button>
<br><br>
<button onclick="backMain()">Back</button>
</div>

<div id="paymentPage">
<h2>Enter Payment</h2>
<input type="number" id="amount" placeholder="Amount MAD">
<input id="description" maxlength="60" placeholder="Description">
<br><br>
<button onclick="sendData()">Send</button>
<br><br>
<button onclick="backChoose()">Back</button>
</div>

<script>
let currentUser = "";
let mainPerson = "";
let selectedPerson = "";

function checkLogin() {
    const password = document.getElementById("password").value;
    if(password === "12341234") {
        currentUser = document.getElementById("username").value || "user";
        document.getElementById("loginPage").style.display = "none";
        document.getElementById("mainPage").style.display = "flex";
    } else {
        alert("Wrong password - Use: 12341234");
    }
}

function openPerson(name) {
    mainPerson = name;
    document.getElementById("mainPage").style.display = "none";
    document.getElementById("choosePage").style.display = "flex";
}

function backMain() {
    document.getElementById("choosePage").style.display = "none";
    document.getElementById("mainPage").style.display = "flex";
}

function selectPerson(name) {
    selectedPerson = name;
    document.getElementById("choosePage").style.display = "none";
    document.getElementById("paymentPage").style.display = "flex";
}

function backChoose() {
    document.getElementById("paymentPage").style.display = "none";
    document.getElementById("choosePage").style.display = "flex";
}

function sendData() {
    const amount = document.getElementById("amount").value;
    const description = document.getElementById("description").value;
    
    if(amount === "" || description === "") {
        alert("Please fill all fields");
        return;
    }
    
    // حفظ في localStorage للتجربة
    let payments = JSON.parse(localStorage.getItem("payments")) || [];
    payments.push({
        main: mainPerson,
        partner: selectedPerson,
        amount: amount + " MAD",
        description: description,
        date: new Date().toLocaleString(),
        user: currentUser
    });
    localStorage.setItem("payments", JSON.stringify(payments));
    
    alert("Saved! (locally)");
    document.getElementById("amount").value = "";
    document.getElementById("description").value = "";
    backChoose();
}
</script>
</body>
</html>
