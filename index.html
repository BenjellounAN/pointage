<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Private System</title>

<style>
body{
margin:0;
font-family:Arial;
}

/* Fixed Admin Button */
.fixed-admin-btn {
    position: fixed;
    top: 20px;
    right: 20px;
    z-index: 1000;
    background: #2c3e50;
    color: white;
    border: none;
    padding: 12px 24px;
    border-radius: 40px;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    display: flex;
    align-items: center;
    gap: 8px;
    transition: all 0.3s ease;
    border: 2px solid white;
}

.fixed-admin-btn:hover {
    background: #34495e;
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(0,0,0,0.3);
}

.fixed-admin-btn:active {
    transform: translateY(0);
}

.fixed-admin-btn span {
    font-size: 20px;
}

/* LOGIN */
#loginPage{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
background:#f2f2f2;
position: relative;
}

input{
padding:10px;
font-size:16px;
margin:5px;
width:200px;
border: 1px solid #ddd;
border-radius: 4px;
}

button{
padding:10px 20px;
font-size:16px;
border:none;
cursor:pointer;
border-radius:6px;
}

#mainPage,#choosePage,#paymentPage{
display:none;
height:100vh;
background:white;
justify-content:center;
align-items:center;
flex-direction:column;
position: relative;
}

.main-btn{
width:200px;
margin:10px;
color:white;
font-weight:bold;
border-radius: 8px;
transition: transform 0.2s;
}

.main-btn:active {
    transform: scale(0.95);
}

.red{background:red;}
.blue{background:#2196f3;}
.orange{background:orange;}
.green{background:green;}
.yellow{background:gold;color:black;}

.money-container{
display:flex;
align-items:center;
}

.mad-label{
margin-left:5px;
font-weight:bold;
}

/* Responsive for mobile */
@media (max-width: 768px) {
    .fixed-admin-btn {
        top: 10px;
        right: 10px;
        padding: 10px 18px;
        font-size: 14px;
    }
    
    .main-btn {
        width: 180px;
    }
}

</style>
</head>

<body>

<!-- Fixed Admin Button -->
<button class="fixed-admin-btn" onclick="openAdminPanel()">
    <span></span> ADMIN
</button>

<!-- LOGIN -->
<div id="loginPage">
<h2>User Login</h2>
<input id="username" placeholder="User name">
<input type="password" id="password" placeholder="Password">
<button onclick="checkLogin()">Login</button>
</div>

<!-- MAIN PAGE -->
<div id="mainPage">
<button class="main-btn red" onclick="openPerson('Anas')">Anas</button>
<button class="main-btn blue" onclick="openPerson('Oussama')">Oussama</button>
<button class="main-btn yellow" onclick="openPerson('Amine')">Amine</button>
</div>

<!-- CHOOSE PAGE -->
<div id="choosePage">
<h2>Select Partner</h2>
<button class="main-btn orange" onclick="selectPerson('Houssam')">Houssam</button>
<button class="main-btn green" onclick="selectPerson('Zaki')">Zaki</button>
<br><br>
<button onclick="backMain()">Back</button>
</div>

<!-- PAYMENT PAGE -->
<div id="paymentPage">
<h2>Enter Payment</h2>
<div class="money-container">
<input type="number" id="amount" placeholder="Amount">
<span class="mad-label">MAD</span>
</div>
<input id="description" maxlength="60" placeholder="Description">
<br><br>
<button onclick="sendData()">Send</button>
<br><br>
<button onclick="backChoose()">Back</button>
</div>

<!-- Firebase SDK -->
<script type="module">

// Firebase App
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// Firebase Config
const firebaseConfig = {
  apiKey: "AIzaSyCh8ssk6K7_LXDPpG3X85Z7VlUwDa_0_Og",
  authDomain: "deliverymarrakech.firebaseapp.com",
  projectId: "deliverymarrakech",
  storageBucket: "deliverymarrakech.firebasestorage.app",
  messagingSenderId: "543072772322",
  appId: "1:543072772322:web:468d0c047e06c86bde7ebb",
  measurementId: "G-YMXBJFJ9N8"
};

// Initialize Firebase
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// Login & Page Logic
let currentUser = ""
let mainPerson = ""
let selectedPerson = ""
const allowedUsers = ["user1","user2","user3","user4","user5","user6","user7","user8","user9","user10"]

function openAdminPanel() {
    window.location.href = 'admin.html';
}

function checkLogin(){
    const username = document.getElementById("username").value.trim()
    const password = document.getElementById("password").value
    if(allowedUsers.includes(username) && password === "12341234"){
        currentUser = username
        document.getElementById("loginPage").style.display = "none"
        document.getElementById("mainPage").style.display = "flex"
    }else{
        alert("Invalid username or password")
    }
}

function openPerson(name){
    mainPerson = name
    document.getElementById("mainPage").style.display = "none"
    document.getElementById("choosePage").style.display = "flex"
}

function backMain(){
    document.getElementById("choosePage").style.display = "none"
    document.getElementById("mainPage").style.display = "flex"
}

function selectPerson(name){
    selectedPerson = name
    document.getElementById("choosePage").style.display = "none"
    document.getElementById("paymentPage").style.display = "flex"
}

function backChoose(){
    document.getElementById("paymentPage").style.display = "none"
    document.getElementById("choosePage").style.display = "flex"
}

// Send data to Firestore
async function sendData(){
    const amount = document.getElementById("amount").value
    const description = document.getElementById("description").value

    if(amount === "" || description === ""){
        alert("Please fill all fields")
        return
    }

    const half = amount / 2
    const data = {
        main: mainPerson,
        partner: selectedPerson,
        amount: amount + " MAD",
        main_share: half + " MAD",
        partner_share: half + " MAD",
        description: description,
        date: new Date().toLocaleString(),
        loggedInUser: currentUser
    }

    try {
        await addDoc(collection(db, "payments"), data)
        alert("✅ Saved Successfully!")
        document.getElementById("amount").value = ""
        document.getElementById("description").value = ""
        backChoose()
    } catch (error) {
        console.error("Error adding document: ", error)
        alert("Error saving data")
    }
}

// Keyboard support for Enter key
document.addEventListener('keypress', function(e) {
    if (e.key === 'Enter') {
        if (document.getElementById("loginPage").style.display !== "none") {
            checkLogin();
        }
    }
});

</script>
</body>
</html>
