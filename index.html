<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>System</title>

<style>
body{
font-family:Arial;
padding:20px;
}

#adminBtn{
position:absolute;
top:20px;
right:20px;
background:black;
color:white;
padding:10px 20px;
border:none;
border-radius:6px;
cursor:pointer;
}

button{
padding:12px 25px;
margin:10px;
border:none;
color:white;
font-size:16px;
border-radius:6px;
cursor:pointer;
}

#step2{
display:none;
}

#step3{
display:none;
}

input,textarea{
width:300px;
padding:10px;
margin-top:5px;
margin-bottom:15px;
display:block;
}

</style>
</head>

<body>

<button id="adminBtn">Admin</button>

<h2>Choose name</h2>

<div id="step1">

<button id="anas" style="background:red;">Anas</button>

<button id="oussama" style="background:blue;">Oussama</button>

<button id="amine" style="background:yellow;color:black;">Amine</button>

</div>


<div id="step2">

<h2>Choose second name</h2>

<button id="houssam" style="background:brown;">Houssam</button>

<button id="zaki" style="background:green;">Zaki</button>

<!-- New purple button for mohamed -->
<button id="mohamed" style="background:purple;">Mohamed</button>

<br>

<button id="backToFirst" style="background:gray;">Back</button>

</div>


<div id="step3">

<h2>Information</h2>

<label>Price MAD</label>
<input type="number" id="price">

<label>Description</label>
<textarea id="desc"></textarea>

<button id="send" style="background:green;">Send</button>

<button id="back" style="background:gray;">Back</button>

</div>


<!-- Firebase -->

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>

const firebaseConfig = {
apiKey: "AIzaSyCh8ssk6K7_LXDPpG3X85Z7VlUwDa_0_Og",
authDomain: "deliverymarrakech.firebaseapp.com",
projectId: "deliverymarrakech",
storageBucket: "deliverymarrakech.firebasestorage.app",
messagingSenderId: "543072772322",
appId: "1:543072772322:web:468d0c047e06c86bde7ebb",
measurementId: "G-YMXBJFJ9N8"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();


let mainName=""
let secondName=""

/* admin */
document.getElementById("adminBtn").onclick=function(){
// التحقق مما إذا كان المستخدم مسجل الدخول قبل الذهاب إلى admin
const isAuth = sessionStorage.getItem('isAuthenticated') === 'true' || 
               sessionStorage.getItem('delivery_auth') === 'true' ||
               localStorage.getItem('delivery_auth') === 'true';
    
if (isAuth) {
    window.location.href = "admin.html";
} else {
    window.location.href = "login.html"; // أو index.html إذا كانت صفحة تسجيل الدخول هي نفسها
}
}

/* step1 */

document.getElementById("anas").onclick=function(){
mainName="anas"
goStep2()
}

document.getElementById("oussama").onclick=function(){
mainName="oussama"
goStep2()
}

document.getElementById("amine").onclick=function(){
mainName="amine"
goStep2()
}

/* step2 */

document.getElementById("houssam").onclick=function(){
secondName="houssam"
goStep3()
}

document.getElementById("zaki").onclick=function(){
secondName="zaki"
goStep3()
}

// Handler for mohamed button
document.getElementById("mohamed").onclick=function(){
secondName="mohamed"
goStep3()
}

/* back */

document.getElementById("backToFirst").onclick=function(){

document.getElementById("step2").style.display="none"
document.getElementById("step1").style.display="block"

}

document.getElementById("back").onclick=function(){

document.getElementById("step3").style.display="none"
document.getElementById("step2").style.display="block"

}

/* send */

document.getElementById("send").onclick=function(){

let price=document.getElementById("price").value
let desc=document.getElementById("desc").value

if(price==""){
alert("Enter price")
return
}

db.collection("payments").add({

name1:mainName,
name2:secondName,
price:price,
description:desc,
time:new Date()

})

.then(function(){

alert("Saved")

document.getElementById("price").value=""
document.getElementById("desc").value=""

})

}

/* functions */

function goStep2(){

document.getElementById("step1").style.display="none"
document.getElementById("step2").style.display="block"

}

function goStep3(){

document.getElementById("step2").style.display="none"
document.getElementById("step3").style.display="block"

}

</script>

</body>
</html>
