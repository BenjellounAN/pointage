<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Private System</title>
<style>
body { 
    margin:0; 
    font-family:Arial; 
    background: white;
}
#mainPage {
    height:100vh;
    background:white;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}
#choosePage, #paymentPage {
    display:none;
    height:100vh;
    background:white;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}
.main-btn {
    width:200px;
    margin:10px;
    color:white;
    font-weight:bold;
    border-radius:8px;
    padding: 15px;
    font-size: 18px;
    border: none;
    cursor: pointer;
}
.red { background:red; }
.blue { background:#2196f3; }
.orange { background:orange; }
.green { background:green; }
.yellow { background:gold; color:black; }
.fixed-admin-btn {
    position: fixed;
    top: 20px;
    right: 20px;
    z-index: 1000;
    background: #2c3e50;
    color: white;
    border: none;
    padding: 10px 20px;
    border-radius: 5px;
    cursor: pointer;
}
.money-container {
    margin: 10px;
}
.money-container input {
    padding: 10px;
    font-size: 16px;
    width: 200px;
    border: 1px solid #ddd;
    border-radius: 4px;
}
.back-btn {
    background: #95a5a6;
    color: white;
    margin-top: 20px;
    padding: 10px 20px;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}
h2 {
    color: #333;
    margin-bottom: 30px;
}
</style>
</head>
<body>

<button class="fixed-admin-btn" onclick="goToAdmin()">ADMIN</button>

<!-- MAIN PAGE -->
<div id="mainPage">
<h2>👤 Select Your Name</h2>
<button class="main-btn red" onclick="selectMain('Anas')">Anas</button>
<button class="main-btn blue" onclick="selectMain('Oussama')">Oussama</button>
<button class="main-btn yellow" onclick="selectMain('Amine')">Amine</button>
</div>

<!-- CHOOSE PAGE -->
<div id="choosePage">
<h2>🤝 Select Partner</h2>
<button class="main-btn orange" onclick="selectPartner('Houssam')">Houssam</button>
<button class="main-btn green" onclick="selectPartner('Zaki')">Zaki</button>
<br><br>
<button class="back-btn" onclick="goBackToMain()">← Back</button>
</div>

<!-- PAYMENT PAGE -->
<div id="paymentPage">
<h2>💰 Enter Payment</h2>
<div class="money-container">
<input type="number" id="amount" placeholder="Amount MAD">
</div>
<input id="description" maxlength="60" placeholder="Description" style="padding:10px; width:200px; margin:10px;">
<br><br>
<button onclick="savePayment()" style="background:#4CAF50; color:white; padding:10px 20px; border:none; border-radius:5px; cursor:pointer;">✅ Send</button>
<br><br>
<button class="back-btn" onclick="goBackToChoose()">← Back</button>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js"></script>

<script>
// تكوين Firebase
const firebaseConfig = {
    apiKey: "AIzaSyCh8ssk6K7_LXDPpG3X85Z7VlUwDa_0_Og",
    authDomain: "deliverymarrakech.firebaseapp.com",
    projectId: "deliverymarrakech",
    storageBucket: "deliverymarrakech.firebasestorage.app",
    messagingSenderId: "543072772322",
    appId: "1:543072772322:web:468d0c047e06c86bde7ebb"
};

// تهيئة Firebase
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// متغيرات عامة
let currentUser = "";
let selectedMain = "";
let selectedPartner = "";

// التحقق من تسجيل الدخول
window.onload = function() {
    const loggedInUser = sessionStorage.getItem("currentUser");
    
    if (!loggedInUser) {
        window.location.href = "login.html";
    } else {
        currentUser = loggedInUser;
        showMainPage();
    }
};

// دوال التنقل بين الصفحات
function showMainPage() {
    document.getElementById("mainPage").style.display = "flex";
    document.getElementById("choosePage").style.display = "none";
    document.getElementById("paymentPage").style.display = "none";
}

function showChoosePage() {
    document.getElementById("mainPage").style.display = "none";
    document.getElementById("choosePage").style.display = "flex";
    document.getElementById("paymentPage").style.display = "none";
}

function showPaymentPage() {
    document.getElementById("mainPage").style.display = "none";
    document.getElementById("choosePage").style.display = "none";
    document.getElementById("paymentPage").style.display = "flex";
}

// دوال اختيار الأشخاص
function selectMain(name) {
    selectedMain = name;
    showChoosePage();
}

function selectPartner(name) {
    selectedPartner = name;
    showPaymentPage();
}

function goBackToMain() {
    showMainPage();
}

function goBackToChoose() {
    showChoosePage();
    document.getElementById("amount").value = "";
    document.getElementById("description").value = "";
}

// دالة الذهاب إلى صفحة الإدارة
function goToAdmin() {
    window.location.href = "login.html";
}

// حفظ البيانات
function savePayment() {
    const amount = document.getElementById("amount").value;
    const description = document.getElementById("description").value;
    
    if(amount === "" || description === "") {
        alert("⚠️ Please fill all fields");
        return;
    }
    
    if(amount <= 0) {
        alert("⚠️ Please enter a valid amount");
        return;
    }
    
    const paymentData = {
        main: selectedMain,
        partner: selectedPartner,
        amount: amount + " MAD",
        description: description,
        date: new Date().toLocaleString(),
        user: currentUser,
        timestamp: new Date().toISOString()
    };
    
    // إرسال إلى Firebase
    db.collection("payments").add(paymentData)
    .then(function() {
        alert("✅ Saved successfully!");
        document.getElementById("amount").value = "";
        document.getElementById("description").value = "";
        showChoosePage();
    })
    .catch(function(error) {
        console.error("Error:", error);
        alert("❌ Error saving to database");
    });
}
</script>
</body>
</html>
